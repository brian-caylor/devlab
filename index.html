<script type="text/babel">

// ── Constants ──────────────────────────────────────────────────────────────────

const CREDS_KEY = 'devlab-creds-v2';

};
const PRIORITY_CYCLE = ['none', 'low', 'medium', 'high', 'critical'];

const MACHINES = ['Windows Desktop', 'Mac Mini M4', 'MacBook'];
const MODELS   = ['Claude', 'ChatGPT/Sol', 'Gemini', 'Mixed', 'Other'];

const LABEL_COLORS = {
  bug:      { color: '#ef5350', bg: 'rgba(239,83,80,0.10)' },
  feature:  { color: '#00e676', bg: 'rgba(0,230,118,0.10)' },
  refactor: { color: '#29b6f6', bg: 'rgba(41,182,246,0.10)' },
  research: { color: '#ce93d8', bg: 'rgba(206,147,216,0.10)' },
  blocked:  { color: '#ef5350', bg: 'rgba(239,83,80,0.10)' },
  question: { color: '#ffa726', bg: 'rgba(255,167,38,0.10)' },
};
const DEFAULT_LABEL_COLOR = { color: '#4a4a6a', bg: 'rgba(74,74,106,0.10)' };
const ANTHROPIC_KEY = 'devlab-anthropic-key';

// ── Utilities ──────────────────────────────────────────────────────────────────
const uid  = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const now  = () => new Date().toISOString();
const ago  = (iso) => {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  return d === 0 ? 'Today' : d === 1 ? 'Yesterday' : `${d}d ago`;
};

function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary);
}
function fromBase64(b64) {
  const binary = atob(b64.replace(/\n/g, ''));
  const bytes  = Uint8Array.from(binary, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

// ── Data normalization ────────────────────────────────────────────────────────
const normalizeSubtask = (s, idx) => ({
  id: s.id, title: s.title || '', status: s.status || 'todo',
  order: s.order ?? idx, createdAt: s.createdAt || new Date().toISOString(),
});

const normalizeTask = (t, idx) => {
  const nt = { description: '', priority: 'medium', dueDate: null, order: idx, completedAt: null, labels: [], subtasks: [], githubLink: null, milestoneId: null, ...t };
  if (nt.order == null) nt.order = idx;
  nt.subtasks = (nt.subtasks || []).map((s, i) => normalizeSubtask(s, i));
  return nt;
};

const normalizeProject = (p, idx) => {
  const np = { priority: 'none', order: idx, tasks: [], milestones: [], ...p };
  if (np.order == null) np.order = idx;
  np.tasks = (np.tasks || []).map((t, i) => normalizeTask(t, i));
  np.milestones = np.milestones || [];
  return np;
};

const normalizeData = (data) => ({
  projects: (data.projects || []).map((p, i) => normalizeProject(p, i)),
  ideas: data.ideas || [],
});

// ── Phase 2 utilities ─────────────────────────────────────────────────────────
function relativeTime(iso) {
  if (!iso) return '';
  const seconds = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
  if (seconds < 604800) return `${Math.floor(seconds / 86400)}d ago`;
  return `${Math.floor(seconds / 604800)}w ago`;
}

function parseRepo(repoField) {
  if (!repoField) return null;
  const clean = repoField.replace(/^https?:\/\//, '').replace(/^github\.com\//, '').replace(/\/$/, '');
  const parts = clean.split('/');
  if (parts.length < 2) return null;
  return { owner: parts[0], repoName: parts[1] };
}

const loadAnthropicKey = () => { try { return localStorage.getItem(ANTHROPIC_KEY) || ''; } catch { return ''; } };

// ── Markdown parser ───────────────────────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inl = s => esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  let html = '', inCode = false, inList = false, codeBlock = '';
  for (const line of text.split('\n')) {
    if (line.startsWith('```')) {
      if (inCode) { html += '<pre><code>' + esc(codeBlock.trimEnd()) + '</code></pre>'; codeBlock = ''; }
      inCode = !inCode;
      continue;
    }
    if (inCode) { codeBlock += line + '\n'; continue; }
    const isList = /^[-*] /.test(line) || /^\d+\.\s/.test(line);
    if (inList && !isList) { html += '</ul>'; inList = false; }
    if (isList && !inList) { html += '<ul>'; inList = true; }
    if (line.startsWith('### ')) html += '<h3>' + inl(line.slice(4)) + '</h3>';
    else if (line.startsWith('## ')) html += '<h2>' + inl(line.slice(3)) + '</h2>';
    else if (line.startsWith('# ')) html += '<h1>' + inl(line.slice(2)) + '</h1>';
    else if (/^-{3,}$/.test(line.trim())) html += '<hr/>';
    else if (/^[-*] /.test(line)) html += '<li>' + inl(line.slice(2)) + '</li>';
    else if (/^\d+\.\s/.test(line)) html += '<li>' + inl(line.replace(/^\d+\.\s/, '')) + '</li>';
    else if (!line.trim()) html += '<br/>';
    else html += '<p>' + inl(line) + '</p>';
  }
  if (inList) html += '</ul>';
  if (inCode) html += '<pre><code>' + esc(codeBlock.trimEnd()) + '</code></pre>';
  return html;
}

// ── GitHub API ─────────────────────────────────────────────────────────────────
async function ghRequest(creds, method, path, body) {
  const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/contents/${path}`, {
    method,
    headers: {
      Authorization: `Bearer ${creds.token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub ${res.status}`);
  }
  return res.json();
}

async function loadFromGH(creds) {
  const file = await ghRequest(creds, 'GET', DATA_FILE);
  return {
    data: JSON.parse(fromBase64(file.content)),
    sha:  file.sha,
  };
}

async function saveToGH(creds, data, sha) {
  const body = {
    message: `devlab: sync ${new Date().toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}`,
    content: toBase64(JSON.stringify(data, null, 2)),
  };
  if (sha) body.sha = sha;
  const result = await ghRequest(creds, 'PUT', DATA_FILE, body);
  return result.content.sha;
}

// ── Local credentials ──────────────────────────────────────────────────────────
const loadCreds = () => { try { return JSON.parse(localStorage.getItem(CREDS_KEY)); } catch { return null; } };
const saveCreds = (c) => localStorage.setItem(CREDS_KEY, JSON.stringify(c));
const dropCreds = () => localStorage.removeItem(CREDS_KEY);

// ── Setup Screen ───────────────────────────────────────────────────────────────
function Setup({ onSave }) {
  const [owner,   setOwner]   = useState('Brian-Caylor');
  const [repo,    setRepo]    = useState('devlab');
  const [token,   setToken]   = useState('');
  const [err,     setErr]     = useState('');
  const [loading, setLoading] = useState(false);

  const handleConnect = async () => {
    if (!token.trim()) { setErr('A Personal Access Token is required.'); return; }
    setLoading(true); setErr('');
    const creds = { owner: owner.trim(), repo: repo.trim(), token: token.trim() };
    try {
      await ghRequest(creds, 'GET', DATA_FILE);
    } catch (e) {
      if (!e.message.includes('404')) {
        setErr(e.message.includes('401') ? 'Token invalid or expired — check your PAT.' : e.message);
        setLoading(false); return;
      }
    }
    saveCreds(creds);
    onSave(creds);
    setLoading(false);
  };

  const inputStyle = {
    width: '100%', background: '#0c0c16', border: '1px solid #1a1a2a',
    borderRadius: 8, padding: '10px 14px', color: '#d8d8e8', fontSize: 14, outline: 'none',
  };
  const labelStyle = {
    display: 'block', fontSize: 10, fontWeight: 600, color: '#4a4a6a',
    letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 6,
  };

  return (
    <div style={{ minHeight:'100vh', background:'#08080f', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ width:'100%', maxWidth:440, background:'#10101a', border:'1px solid #1e1e2e', borderRadius:16, padding:32 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6 }}>
          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:24, fontWeight:700, letterSpacing:'0.14em', color:'#fff' }}>DEV LAB</span>
          <span style={{ fontSize:10, background:'rgba(0,230,118,0.10)', color:'#00e676', padding:'2px 8px', borderRadius:99, letterSpacing:'0.08em', fontWeight:600 }}>SETUP</span>
        </div>
        <p style={{ fontSize:13, color:'#4a4a6a', marginBottom:28, lineHeight:1.6 }}>
          Connect a GitHub repo to store your projects and ideas. Every save is a real git commit — works anywhere with a browser.
        </p>

        <div style={{ marginBottom:14 }}>
          <label style={labelStyle}>GitHub Repo Owner</label>
          <input value={owner} onChange={e => setOwner(e.target.value)} placeholder="Brian-Caylor" style={inputStyle}/>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={labelStyle}>Repo Name</label>
          <input value={repo} onChange={e => setRepo(e.target.value)} placeholder="devlab" style={inputStyle}/>
        </div>
        <div style={{ marginBottom:24 }}>
          <label style={labelStyle}>Personal Access Token (PAT)</label>
          <input type="password" value={token} onChange={e => setToken(e.target.value)}
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style={inputStyle}
            onKeyDown={e => e.key === 'Enter' && handleConnect()}/>
          <p style={{ fontSize:11, color:'#3a3a55', marginTop:7, lineHeight:1.5 }}>
            Needs <code style={{color:'#5a5a9a', fontFamily:"'JetBrains Mono',monospace"}}>repo</code> scope. Stored only in your browser.{' '}
            <a href={`https://github.com/settings/tokens/new?scopes=repo&description=DevLab`}
              target="_blank" rel="noopener noreferrer" style={{ color:'#29b6f6' }}>
              Create one →
            </a>
          </p>
        </div>

        {err && <div style={{ color:'#ef5350', fontSize:12, marginBottom:14, lineHeight:1.5 }}>{err}</div>}

        <button onClick={handleConnect} disabled={loading} style={{
          width:'100%', padding:12, background:'#00e676', border:'none', borderRadius:9,
          color:'#000', fontSize:14, fontWeight:600, cursor: loading?'not-allowed':'pointer',
          opacity: loading ? .65 : 1, transition:'opacity .15s',
        }}>
          {loading ? 'Connecting…' : 'Connect & Launch →'}
        </button>
      </div>
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────────
function App() {
  const [creds,   setCreds]   = useState(loadCreds);
  const [projects,setProjects]= useState([]);
  const [ideas,   setIdeas]   = useState([]);
  const [sha,     setSha]     = useState(null);
  const [tab,     setTab]     = useState('projects');
  const [filter,  setFilter]  = useState('all');
  const [sortMode,setSortMode]= useState('updated');
  const [modal,   setModal]   = useState(null);
  const [newIdea, setNewIdea] = useState('');
  const [sync,    setSync]    = useState('loading');
  const [syncMsg, setSyncMsg] = useState('');
  const [ready,   setReady]   = useState(false);
  const [view,    setView]    = useState('dashboard');
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [openTaskId, setOpenTaskId] = useState(null);
  const [showSearch, setShowSearch] = useState(false);
  const scrollRef  = useRef(0);
  const ideaRef    = useRef(null);
  const saveTimer  = useRef(null);
  const shaRef     = useRef(sha);
  const projRef    = useRef(projects);
  const ideaStateRef = useRef(ideas);
  shaRef.current       = sha;
  projRef.current      = projects;
  ideaStateRef.current = ideas;

  // ── ⌘K shortcut ──
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setShowSearch(true); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // ── Load from GitHub ──
  useEffect(() => {
    if (!creds) return;
    (async () => {
      setSync('loading');
      try {
        const { data, sha: fileSha } = await loadFromGH(creds);
        const nd = normalizeData(data);
        setProjects(nd.projects);
        setIdeas(nd.ideas);
        setSha(fileSha);
        shaRef.current = fileSha;
        setSync('idle');
      } catch (e) {
        if (e.message.includes('404')) {
          setSync('idle');
        } else {
          setSync('error');
          setSyncMsg('Could not load data: ' + e.message);
        }
      }
      setReady(true);
    })();
  }, [creds]);

  // ── Debounced save ──
  const triggerSave = useCallback(() => {
    if (!ready) return;
    clearTimeout(saveTimer.current);
    setSync('saving');
    saveTimer.current = setTimeout(async () => {
      try {
        const newSha = await saveToGH(
          creds,
          { projects: projRef.current, ideas: ideaStateRef.current },
          shaRef.current
        );
        setSha(newSha);
        shaRef.current = newSha;
        setSync('idle');
        setSyncMsg('');
      } catch (e) {
        setSync('error');
        setSyncMsg('Save failed: ' + e.message);
      }
    }, 1800);
  }, [creds, ready]);

  // ── Manual sync ──
  const handleSync = async () => {
    clearTimeout(saveTimer.current);
    setSync('loading');
    try {
      const { data, sha: fileSha } = await loadFromGH(creds);
      const nd = normalizeData(data);
      setProjects(nd.projects);
      setIdeas(nd.ideas);
      setSha(fileSha);
      shaRef.current = fileSha;
      setSync('idle');
      setSyncMsg('');
    } catch (e) {
      setSync('error');
      setSyncMsg('Sync failed: ' + e.message);
    }
  };

  // ── State helpers ──
  const mutateProjects = (fn) => {
    setProjects(prev => { const next = fn(prev); projRef.current = next; triggerSave(); return next; });
  };
  const mutateIdeas = (fn) => {
    setIdeas(prev => { const next = fn(prev); ideaStateRef.current = next; triggerSave(); return next; });
  };

  // ── Project ops ──
  const saveProject = (data) => {
    if (modal.mode === 'add') {
      mutateProjects(p => [{ ...data, id: uid(), createdAt: now(), tasks: [], order: 0 }, ...p.map(x => ({...x, order: x.order + 1}))]);
    } else {
      mutateProjects(p => p.map(x => x.id === data.id ? { ...x, ...data } : x));
    }
    setModal(null);
  };
  const deleteProject = (id) => {
    if (!window.confirm('Delete this project?')) return;
    mutateProjects(p => p.filter(x => x.id !== id));
    if (activeProjectId === id) { setView('dashboard'); setActiveProjectId(null); }
  };

  // ── Project mutation (for detail view) ──
  const updateProject = useCallback((id, changes) => {
    mutateProjects(ps => ps.map(p => p.id === id ? { ...p, ...changes, lastUpdated: now() } : p));
  }, [triggerSave]);

  // ── Task ops ──
  const addTask = useCallback((projectId, title) => {
    const taskId = uid();
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      const newTask = { id: taskId, title, description: '', status: 'todo', priority: 'medium', dueDate: null, order: p.tasks.length, createdAt: now(), completedAt: null };
      return { ...p, tasks: [...p.tasks, newTask], lastUpdated: now() };
    }));
    return taskId;
  }, [triggerSave]);

  const updateTask = useCallback((projectId, taskId, updates) => {
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return { ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, ...updates } : t), lastUpdated: now() };
    }));
  }, [triggerSave]);

  const deleteTask = useCallback((projectId, taskId) => {
    if (!window.confirm('Delete this task?')) return;
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return { ...p, tasks: p.tasks.filter(t => t.id !== taskId), lastUpdated: now() };
    }));
  }, [triggerSave]);

  const reorderTasks = useCallback((projectId, reorderedTasks) => {
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return { ...p, tasks: reorderedTasks, lastUpdated: now() };
    }));
  }, [triggerSave]);

  const reorderProjects = useCallback((reordered) => {
    mutateProjects(() => reordered);
    setSortMode('custom');
  }, [triggerSave]);

  // ── Idea ops ──
  const addIdea = () => {
    if (!newIdea.trim()) return;
    mutateIdeas(i => [{ id: uid(), text: newIdea.trim(), createdAt: now() }, ...i]);
    setNewIdea('');
    ideaRef.current?.focus();
  };
  const deleteIdea = (id) => mutateIdeas(i => i.filter(x => x.id !== id));
  const promoteIdea = (idea) => {
    deleteIdea(idea.id);
    setModal({ mode: 'add', data: { name:'', description: idea.text, status:'idea', machines:[], repo:'', notes:'', aiModel:'Claude', priority:'none' } });
    setTab('projects');
    if (view !== 'dashboard') { setView('dashboard'); setActiveProjectId(null); }
  };

  // ── Navigation ──
  const openProject = useCallback((id, taskId) => {
    scrollRef.current = window.scrollY;
    setActiveProjectId(id);
    setOpenTaskId(taskId || null);
    setView('project');
    window.scrollTo(0, 0);
  }, []);

  const goBack = useCallback(() => {
    setView('dashboard');
    setActiveProjectId(null);
    requestAnimationFrame(() => window.scrollTo(0, scrollRef.current));
  }, []);

  if (!creds) {
    return <Setup onSave={(c) => { setCreds(c); }} />;
  }

  // ── Derived data ──
  const filtered = projects.filter(p => filter === 'all' || p.status === filter);
  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sortMode === 'priority') {
      arr.sort((a, b) => {
        const pa = PRIORITY_ORDER[a.priority || 'none'] ?? 4;
        const pb = PRIORITY_ORDER[b.priority || 'none'] ?? 4;
        if (pa !== pb) return pa - pb;
        return new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0);
      });
    } else if (sortMode === 'custom') {
      arr.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    } else {
      arr.sort((a, b) => new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0));
    }
    return arr;
  }, [filtered, sortMode]);

  const counts   = Object.fromEntries(Object.keys(STATUS).map(s => [s, projects.filter(p => p.status === s).length]));
  const blank    = { name:'', description:'', status:'active', machines:[], repo:'', notes:'', aiModel:'Claude', priority:'none' };
  const activeProject = projects.find(p => p.id === activeProjectId);

  const syncColor = { loading:'#3a3a55', saving:'#ffa726', idle:'#3a3a55', error:'#ef5350' }[sync];
  const syncLabel = { loading:'Loading…', saving:'Saving…', idle:'Synced', error:'Error' }[sync];

  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif", background:'#08080f', minHeight:'100vh', color:'#d8d8e8', maxWidth:980, margin:'0 auto', paddingBottom:80 }}>

      {/* ── Header ── */}
      <div style={{ padding:'24px 20px 0', display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexWrap:'wrap', gap:16 }} className="header-row">
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:5 }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#00e676" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
            <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:700, letterSpacing:'0.14em', color:'#fff' }}>DEV LAB</span>
            <button onClick={handleSync} title={syncMsg || 'Click to force sync'} style={{ background:'transparent', border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:5, padding:0 }}>
              <span style={{ fontSize:10, fontFamily:"'JetBrains Mono',monospace", color: syncColor, letterSpacing:'0.05em' }}>{syncLabel}</span>
              {(sync === 'loading' || sync === 'saving') && (
                <span style={{ width:6, height:6, borderRadius:'50%', background: syncColor, display:'inline-block' }} className="pulsing" />
              )}
            </button>
          </div>
          <div style={{ fontSize:11, color:'#3a3a55', fontFamily:"'JetBrains Mono',monospace" }}>
            {projects.length} projects · {ideas.length} ideas · {creds.owner}/{creds.repo}
          </div>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ display:'flex', gap:3, background:'#10101a', padding:4, borderRadius:10 }}>
            {[
              { key:'projects', label:'Projects' },
              { key:'tasks',    label:'Tasks', badge: projects.reduce((n, p) => n + (p.tasks || []).filter(t => t.status !== 'done').length, 0) },
              { key:'focus',    label:'Focus' },
              { key:'labels',   label:'Labels' },
              { key:'ideas',    label:'Ideas', badge: ideas.length },
            ].map(t => (
              <button key={t.key} className="tab-btn"
                style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 14px', borderRadius:7, border:'none', background: tab===t.key && view==='dashboard'?'#1a1a2a':'transparent', color: tab===t.key && view==='dashboard'?'#d8d8e8':'#3a3a55', fontSize:13, cursor:'pointer', fontWeight:500 }}
                onClick={() => { setTab(t.key); if (view !== 'dashboard') { setView('dashboard'); setActiveProjectId(null); } }}>
                {t.label}
                {t.badge > 0 && <span style={{ background:'#ffa726', color:'#000', fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:99 }}>{t.badge}</span>}
              </button>
            ))}
          </div>
          <button className="icon-btn" onClick={() => setShowSearch(true)} title="Search (⌘K)"
            style={{ padding:'9px 11px', background:'#10101a', border:'1px solid #1a1a2a', borderRadius:9, color:'#4a4a6a', fontSize:14, cursor:'pointer' }}>
            🔍
          </button>
          <button className="icon-btn" onClick={() => { if(window.confirm('Disconnect from this repo? Your data stays in GitHub.')) { dropCreds(); setCreds(null); } }}
            title="Disconnect / change repo"
            style={{ padding:'9px 11px', background:'#10101a', border:'1px solid #1a1a2a', borderRadius:9, color:'#4a4a6a', fontSize:14, cursor:'pointer' }}>
            ⚙
          </button>
        </div>
      </div>

      {/* ── Error Banner ── */}
      {sync === 'error' && syncMsg && (
        <div style={{ margin:'12px 20px 0', padding:'10px 16px', background:'rgba(239,83,80,0.08)', border:'1px solid rgba(239,83,80,0.25)', borderRadius:8, fontSize:12, color:'#ef5350', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span>{syncMsg}</span>
          <button onClick={handleSync} style={{ background:'transparent', border:'none', color:'#ef5350', fontSize:12, cursor:'pointer', fontWeight:600 }}>Retry →</button>
        </div>
      )}

      {/* ── Detail View ── */}
      {view === 'project' && activeProject && (
        <ProjectDetail
          project={activeProject}
          onBack={goBack}
          onEdit={() => setModal({ mode:'edit', data:{...activeProject} })}
          onUpdateProject={updateProject}
          onAddTask={addTask}
          onUpdateTask={updateTask}
          onDeleteTask={deleteTask}
          onReorderTasks={reorderTasks}
          creds={creds}
          openTaskId={openTaskId}
        />
      )}

      {/* ── Dashboard: Projects Tab ── */}
      {view === 'dashboard' && tab === 'projects' && (
        <div style={{ padding:'22px 20px' }} className="fade-in">
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, flexWrap:'wrap', gap:10 }}>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}>
              <button className="pill"
                style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${filter==='all'?'#d8d8e8':'#18182a'}`, background: filter==='all'?'#1a1a2a':'transparent', color: filter==='all'?'#d8d8e8':'#4a4a6a', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
                onClick={() => setFilter('all')}>
                All <span style={{ opacity:.5 }}>{projects.length}</span>
              </button>
              {Object.entries(STATUS).map(([key, cfg]) =>
                counts[key] > 0 && (
                  <button key={key} className="pill"
                    style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${filter===key?cfg.color:'#18182a'}`, background: filter===key?cfg.bg:'transparent', color: filter===key?cfg.color:'#4a4a6a', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
                    onClick={() => setFilter(key)}>
                    {cfg.label} <span style={{ opacity:.5 }}>{counts[key]}</span>
                  </button>
                )
              )}
              <select value={sortMode} onChange={e => setSortMode(e.target.value)}
                style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:7, padding:'5px 10px', color:'#4a4a6a', fontSize:11, outline:'none', cursor:'pointer' }}>
                <option value="updated">↕ Last Updated</option>
                <option value="priority">↕ Priority</option>
                <option value="custom">↕ Custom Order</option>
              </select>
            </div>
            <button className="add-btn" onClick={() => setModal({ mode:'add', data:{...blank} })}
              style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 16px', background:'#00e676', color:'#000', border:'none', borderRadius:9, fontSize:13, fontWeight:600, cursor:'pointer', transition:'opacity .15s' }}>
              + New Project
            </button>
          </div>

          <ProjectGrid
            projects={sorted}
            onOpen={openProject}
            onEdit={(p) => setModal({ mode:'edit', data:{...p} })}
            onDelete={deleteProject}
            onReorder={reorderProjects}
          />
          {sorted.length === 0 && !ready && (
            <div style={{ color:'#3a3a55', fontSize:13, textAlign:'center', padding:'48px 0' }}>Loading your projects…</div>
          )}
          {sorted.length === 0 && ready && (
            <div style={{ color:'#3a3a55', fontSize:13, textAlign:'center', padding:'48px 0' }}>No projects here. Start one.</div>
          )}
        </div>
      )}

      {/* ── Dashboard: Labels Tab ── */}
      {view === 'dashboard' && tab === 'labels' && (
        <LabelsView projects={projects} onOpenProject={openProject} />
      )}

      {/* ── Dashboard: Focus Tab ── */}
      {view === 'dashboard' && tab === 'focus' && (
        <FocusView projects={projects} onOpenProject={openProject} />
      )}

      {/* ── Dashboard: Tasks Tab ── */}
      {view === 'dashboard' && tab === 'tasks' && (
        <GlobalTaskList
          projects={projects}
          onUpdate={updateTask}
          onDelete={deleteTask}
          onOpenProject={openProject}
        />
      )}

      {/* ── Dashboard: Ideas Tab ── */}
      {view === 'dashboard' && tab === 'ideas' && (
        <div style={{ padding:'22px 20px' }} className="fade-in">
          <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18, marginBottom:14 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:10, fontWeight:600, color:'#ffa726', letterSpacing:'0.09em', textTransform:'uppercase', marginBottom:12 }}>
              ⚡ Quick Capture
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <textarea ref={ideaRef} value={newIdea}
                onChange={e => setNewIdea(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) addIdea(); }}
                placeholder="What's the next thing you want to build?  ⌘↵ to save"
                style={{ flex:1, background:'#0c0c16', border:'1px solid #1a1a2a', borderRadius:8, padding:'10px 14px', color:'#d8d8e8', fontSize:14, outline:'none', lineHeight:1.5 }}
                rows={3}/>
              <button onClick={addIdea}
                style={{ background:'#ffa726', border:'none', borderRadius:8, padding:'0 16px', color:'#000', cursor:'pointer', fontSize:18, display:'flex', alignItems:'center', opacity: newIdea.trim()?1:.35, transition:'opacity .15s' }}>
                →
              </button>
            </div>
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {ideas.length === 0 && ready && (
              <div style={{ color:'#3a3a55', fontSize:13, textAlign:'center', padding:'48px 0' }}>
                No ideas queued. Drop one above before it evaporates.
              </div>
            )}
            {ideas.map(idea => (
              <div key={idea.id} className="idea-row" style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:10, padding:'14px 16px' }}>
                <div style={{ fontSize:14, color:'#b0b0cc', lineHeight:1.55, marginBottom:10 }}>{idea.text}</div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:8 }}>
                  <span style={{ fontSize:10, color:'#3a3a55', fontFamily:"'JetBrains Mono',monospace" }}>
                    ⏱ {ago(idea.createdAt)}
                  </span>
                  <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                    <button className="promote-btn"
                      style={{ display:'flex', alignItems:'center', gap:4, padding:'4px 10px', background:'rgba(41,182,246,0.08)', border:'1px solid rgba(41,182,246,0.18)', borderRadius:6, color:'#29b6f6', fontSize:12, cursor:'pointer' }}
                      onClick={() => promoteIdea(idea)}>
                      › To Project
                    </button>
                    <button className="icon-btn"
                      style={{ display:'flex', alignItems:'center', padding:'4px 6px', background:'transparent', border:'none', color:'#ef5350', borderRadius:5, fontSize:15 }}
                      onClick={() => deleteIdea(idea.id)}>✕</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Modal ── */}
      {/* ── Search Overlay ── */}
      {showSearch && (
        <SearchOverlay
          projects={projects}
          ideas={ideas}
          onClose={() => setShowSearch(false)}
          onOpenProject={openProject}
          onOpenIdeas={() => { setTab('ideas'); if (view !== 'dashboard') { setView('dashboard'); setActiveProjectId(null); } }}
        />
      )}

      {modal && (
        <ProjectModal mode={modal.mode} data={modal.data}
          onSave={saveProject}
          onClose={() => setModal(null)}/>
      )}
    </div>
  );
}

// ── Project Grid (dashboard with DnD) ─────────────────────────────────────────
function ProjectGrid({ projects, onOpen, onEdit, onDelete, onReorder }) {
  const dragRef = useRef({ dragIdx: -1, overIdx: -1 });
  const touchRef = useRef({ dragIdx: -1, startY: 0, el: null, rects: [] });

  const handleDragStart = (e, idx) => {
    dragRef.current.dragIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.style.opacity = '0.4';
  };
  const handleDragOver = (e, idx) => {
    e.preventDefault();
    dragRef.current.overIdx = idx;
  };
  const handleDrop = (e, idx) => {
    e.preventDefault();
    const { dragIdx } = dragRef.current;
    if (dragIdx < 0 || dragIdx === idx) return;
    const arr = [...projects];
    const [moved] = arr.splice(dragIdx, 1);
    arr.splice(idx, 0, moved);
    arr.forEach((p, i) => p.order = i);
    onReorder(arr);
  };
  const handleDragEnd = (e) => {
    e.currentTarget.style.opacity = '1';
    dragRef.current = { dragIdx: -1, overIdx: -1 };
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(270px, 1fr))', gap:12 }} className="projects-grid">
      {projects.map((p, i) => (
        <ProjectCard key={p.id} project={p}
          onOpen={() => onOpen(p.id)}
          onEdit={(e) => { e.stopPropagation(); onEdit(p); }}
          onDelete={(e) => { e.stopPropagation(); onDelete(p.id); }}
          onDragStart={(e) => handleDragStart(e, i)}
          onDragOver={(e) => handleDragOver(e, i)}
          onDrop={(e) => handleDrop(e, i)}
          onDragEnd={handleDragEnd}
        />
      ))}
    </div>
  );
}

// ── Project Card ───────────────────────────────────────────────────────────────
function ProjectCard({ project, onOpen, onEdit, onDelete, onDragStart, onDragOver, onDrop, onDragEnd }) {
  const cfg = STATUS[project.status] || STATUS.idea;
  const pri = PRIORITY[project.priority] || PRIORITY.none;
  const tasks = project.tasks || [];
  const doneCount = tasks.filter(t => t.status === 'done').length;
  const hasTasks = tasks.length > 0;
  const pct = hasTasks ? Math.round((doneCount / tasks.length) * 100) : 0;

  return (
    <div className="card"
      onClick={onOpen}
      draggable={true}
      onDragStart={onDragStart}
      onDragOver={onDragOver}
      onDrop={onDrop}
      onDragEnd={onDragEnd}
      style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18, display:'flex', flexDirection:'column', gap:10, overflow:'hidden' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:19, fontWeight:700, letterSpacing:'0.02em', color:'#fff', marginBottom:5, lineHeight:1.15, wordBreak:'break-word' }}>{project.name}</div>
          <div style={{ display:'flex', gap:5, flexWrap:'wrap', alignItems:'center' }}>
            <span style={{ display:'inline-block', fontSize:10, fontWeight:600, padding:'2px 8px', borderRadius:99, letterSpacing:'0.05em', textTransform:'uppercase', color:cfg.color, background:cfg.bg }}>
              {cfg.label}
            </span>
            {project.priority && project.priority !== 'none' && (
              <span style={{ display:'inline-block', fontSize:10, fontWeight:600, padding:'2px 8px', borderRadius:99, letterSpacing:'0.05em', textTransform:'uppercase', color:pri.color, background:pri.bg }}>
                {pri.label}
              </span>
            )}
          </div>
        </div>
        <div style={{ display:'flex', gap:2, flexShrink:0 }}>
          <span className="drag-handle" style={{ display:'flex', alignItems:'center', padding:'5px 4px', fontSize:14, color:'#5a5a7a' }}>⠿</span>
          <button className="icon-btn" style={{ display:'flex', alignItems:'center', padding:'5px 6px', background:'transparent', border:'none', color:'#5a5a7a', borderRadius:5, fontSize:14 }} onClick={onEdit}>✎</button>
          <button className="icon-btn" style={{ display:'flex', alignItems:'center', padding:'5px 6px', background:'transparent', border:'none', color:'#ef5350', borderRadius:5, fontSize:14 }} onClick={onDelete}>⊗</button>
        </div>
      </div>

      {project.description && (
        <div style={{ fontSize:13, color:'#7070a0', lineHeight:1.6 }}>{project.description}</div>
      )}
      {project.notes && (
        <div style={{ fontSize:11.5, color:'#505070', lineHeight:1.6, fontFamily:"'JetBrains Mono',monospace", padding:'8px 10px', background:'#0c0c16', borderRadius:6, borderLeft:'2px solid #1e1e32', overflow:'hidden', maxHeight:60, WebkitLineClamp:2, display:'-webkit-box', WebkitBoxOrient:'vertical' }}>
          {project.notes}
        </div>
      )}

      {hasTasks && (
        <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:11, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>
          <span>{doneCount} / {tasks.length}</span>
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:6, marginTop:2 }}>
        <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
          {project.machines?.map(m => (
            <span key={m} style={{ fontSize:10, padding:'2px 7px', borderRadius:4, background:'#18182a', color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>
              {m.replace(' Desktop','').replace(' M4','')}
            </span>
          ))}
          {project.aiModel && (
            <span style={{ fontSize:10, padding:'2px 7px', borderRadius:4, background:'rgba(0,230,118,0.07)', color:'#00a855', fontFamily:"'JetBrains Mono',monospace" }}>
              {project.aiModel}
            </span>
          )}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:5, fontSize:10, color:'#3a3a55', fontFamily:"'JetBrains Mono',monospace" }}>
          ⏱ {ago(project.lastUpdated)}
          {project.repo && (
            <a href={`https://${project.repo.replace(/^https?:\/\//, '')}`} target="_blank" rel="noopener noreferrer"
              style={{ color:'#3a3a55', marginLeft:2, fontSize:12 }}
              onClick={e => e.stopPropagation()}>↗</a>
          )}
        </div>
      </div>

      {/* Progress bar */}
      {hasTasks && (
        <div style={{ margin:'4px -18px -18px', height:4, background:'#18182a', borderRadius:'0 0 11px 11px', overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${pct}%`, background: pct === 100 ? '#00e676' : '#ffa726', transition:'width 0.3s ease' }} />
        </div>
      )}
    </div>
  );
}

// ── Project Detail View ───────────────────────────────────────────────────────

            </span>
          ))}
          {project.aiModel && (
            <span style={{ fontSize:10, padding:'3px 8px', borderRadius:5, background:'rgba(0,230,118,0.07)', color:'#00a855', fontFamily:"'JetBrains Mono',monospace" }}>
              {project.aiModel}
            </span>
          )}
          {project.repo && (
            <a href={`https://${project.repo.replace(/^https?:\/\//, '')}`} target="_blank" rel="noopener noreferrer"
              style={{ fontSize:10, padding:'3px 8px', borderRadius:5, background:'rgba(41,182,246,0.07)', color:'#29b6f6', fontFamily:"'JetBrains Mono',monospace" }}>
              {project.repo.replace(/^https?:\/\//, '').replace('github.com/', '')} ↗
            </a>
          )}
        </div>
      </div>

      {/* Two-panel layout */}
      <div className="detail-panels" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, alignItems:'start' }}>
        <TaskList
          projectId={project.id}
          tasks={project.tasks || []}
          onAdd={onAddTask}
          onUpdate={onUpdateTask}
          onDelete={onDeleteTask}
          onReorder={onReorderTasks}
          openTaskId={openTaskId}
        />
        <NotesPanel
          key={project.id}
          projectId={project.id}
          initialNotes={project.notes || ''}
          onSave={(notes) => onUpdateProject(project.id, { notes })}
        />
      </div>

      {/* GitHub Activity */}
      {project.repo && (
        <div style={{ marginTop:20 }}>
          <GitHubActivity project={project} creds={creds} />
        </div>
      )}
    </div>
  );
}

// ── Task List ──────────────────────────────────────────────────────────────────
function TaskList({ projectId, tasks, onAdd, onUpdate, onDelete, onReorder, openTaskId }) {
  const [newTitle, setNewTitle] = useState('');
  const [expandedId, setExpandedId] = useState(null);

  // Open a specific task from search / focus view
  useEffect(() => { if (openTaskId) setExpandedId(openTaskId); }, [openTaskId]);
  const inputRef = useRef(null);
  const listRef = useRef(null);
  const dragRef = useRef({ dragIdx: -1, overIdx: -1 });
  const touchRef = useRef({ idx: -1, startY: 0, curY: 0, el: null, listEl: null, rects: [], moved: false });

  // Sort: active tasks by order, done tasks at bottom by order
  const sortedTasks = useMemo(() => {
    const active = tasks.filter(t => t.status !== 'done').sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const done = tasks.filter(t => t.status === 'done').sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    return [...active, ...done];
  }, [tasks]);

  const doneCount = tasks.filter(t => t.status === 'done').length;

  const handleAdd = () => {
    if (!newTitle.trim()) return;
    const newId = onAdd(projectId, newTitle.trim());
    setNewTitle('');
    setExpandedId(newId);
    inputRef.current?.focus();
  };

  // ── Desktop DnD ──
  const handleDragStart = (e, idx) => {
    dragRef.current.dragIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.style.opacity = '0.4';
  };
  const handleDragOver = (e, idx) => {
    e.preventDefault();
    dragRef.current.overIdx = idx;
  };
  const handleDrop = (e, idx) => {
    e.preventDefault();
    const { dragIdx } = dragRef.current;
    if (dragIdx < 0 || dragIdx === idx) return;
    const arr = [...sortedTasks];
    const [moved] = arr.splice(dragIdx, 1);
    arr.splice(idx, 0, moved);
    arr.forEach((t, i) => t.order = i);
    onReorder(projectId, arr);
  };
  const handleDragEnd = (e) => {
    e.currentTarget.style.opacity = '1';
    dragRef.current = { dragIdx: -1, overIdx: -1 };
  };

  // ── Mobile touch DnD ──
  const handleTouchStart = (e, idx) => {
    const touch = e.touches[0];
    const row = e.currentTarget.closest('.task-row');
    const list = listRef.current;
    const rows = list ? Array.from(list.querySelectorAll('.task-row')) : [];
    const rects = rows.map(r => r.getBoundingClientRect());
    touchRef.current = { idx, startY: touch.clientY, curY: touch.clientY, el: row, listEl: list, rects, moved: false };
    row.style.opacity = '0.5';
    row.style.position = 'relative';
    row.style.zIndex = '50';
  };
  const handleTouchMove = (e, idx) => {
    e.preventDefault();
    const t = touchRef.current;
    if (t.idx < 0) return;
    t.moved = true;
    const touch = e.touches[0];
    const dy = touch.clientY - t.startY;
    t.curY = touch.clientY;
    t.el.style.transform = `translateY(${dy}px)`;
  };
  const handleTouchEnd = (e) => {
    const t = touchRef.current;
    if (t.idx < 0 || !t.moved) {
      if (t.el) { t.el.style.opacity = ''; t.el.style.position = ''; t.el.style.zIndex = ''; t.el.style.transform = ''; }
      touchRef.current = { idx: -1, startY: 0, curY: 0, el: null, listEl: null, rects: [], moved: false };
      return;
    }
    // Determine drop index from final touch Y
    let dropIdx = t.idx;
    for (let i = 0; i < t.rects.length; i++) {
      const r = t.rects[i];
      if (t.curY >= r.top && t.curY < r.bottom) { dropIdx = i; break; }
    }
    t.el.style.opacity = '';
    t.el.style.position = '';
    t.el.style.zIndex = '';
    t.el.style.transform = '';
    if (dropIdx !== t.idx) {
      const arr = [...sortedTasks];
      const [moved] = arr.splice(t.idx, 1);
      arr.splice(dropIdx, 0, moved);
      arr.forEach((task, i) => task.order = i);
      onReorder(projectId, arr);
    }
    touchRef.current = { idx: -1, startY: 0, curY: 0, el: null, listEl: null, rects: [], moved: false };
  };

  return (
    <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'#fff', textTransform:'uppercase' }}>Tasks</span>
        <span style={{ fontSize:11, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>
          {doneCount} / {tasks.length} done
        </span>
      </div>

      {/* Quick-add */}
      <div style={{ display:'flex', gap:8, marginBottom:16 }}>
        <input ref={inputRef} value={newTitle} onChange={e => setNewTitle(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') handleAdd(); if (e.key === 'Escape') { setNewTitle(''); inputRef.current?.blur(); } }}
          placeholder="Add a task… press Enter to save"
          style={{ flex:1, background:'#0c0c16', border:'1px solid #1a1a2a', borderRadius:8, padding:'9px 12px', color:'#d8d8e8', fontSize:13, outline:'none' }}/>
      </div>

      {/* Task rows */}
      <div ref={listRef} style={{ display:'flex', flexDirection:'column', gap:2 }}>
        {sortedTasks.map((task, idx) => (
          <TaskRow key={task.id} task={task} idx={idx}
            expanded={expandedId === task.id}
            onToggleExpand={() => setExpandedId(expandedId === task.id ? null : task.id)}
            projectId={projectId}
            onUpdate={onUpdate}
            onDelete={onDelete}
            onDragStart={handleDragStart}
            onDragOver={handleDragOver}
            onDrop={handleDrop}
            onDragEnd={handleDragEnd}
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
          />
        ))}
        {tasks.length === 0 && (
          <div style={{ color:'#3a3a55', fontSize:13, textAlign:'center', padding:'24px 0' }}>No tasks yet. Add one above.</div>
        )}
      </div>
    </div>
  );
}

// ── Task Row ───────────────────────────────────────────────────────────────────
function TaskRow({ task, idx, expanded, onToggleExpand, projectId, onUpdate, onDelete, onDragStart, onDragOver, onDrop, onDragEnd, onTouchStart, onTouchMove, onTouchEnd, projectLabel, hideDrag, onOpenProject }) {
  const isDone = task.status === 'done';
  const ts = TASK_STATUS[task.status] || TASK_STATUS.todo;
  const pr = PRIORITY[task.priority] || PRIORITY.medium;

  const [desc, setDesc] = useState(task.description || '');
  const [dueDate, setDueDate] = useState(task.dueDate || '');

  // Sync from props when task changes externally
  useEffect(() => { setDesc(task.description || ''); }, [task.description]);
  useEffect(() => { setDueDate(task.dueDate || ''); }, [task.dueDate]);

  const toggleDone = (e) => {
    e.stopPropagation();
    if (isDone) {
      onUpdate(projectId, task.id, { status: 'todo', completedAt: null });
    } else {
      onUpdate(projectId, task.id, { status: 'done', completedAt: now() });
    }
  };

  const cycleStatus = (e) => {
    e.stopPropagation();
    const i = TASK_STATUS_CYCLE.indexOf(task.status);
    const next = TASK_STATUS_CYCLE[(i + 1) % TASK_STATUS_CYCLE.length];
    const updates = { status: next };
    if (next === 'done') updates.completedAt = now();
    else updates.completedAt = null;
    onUpdate(projectId, task.id, updates);
  };

  const cyclePriority = (e) => {
    e.stopPropagation();
    const i = PRIORITY_CYCLE.indexOf(task.priority || 'medium');
    const next = PRIORITY_CYCLE[(i + 1) % PRIORITY_CYCLE.length];
    onUpdate(projectId, task.id, { priority: next });
  };

  const saveDesc = () => {
    if (desc !== (task.description || '')) onUpdate(projectId, task.id, { description: desc });
  };
  const saveDueDate = (val) => {
    setDueDate(val);
    onUpdate(projectId, task.id, { dueDate: val || null });
  };

  const formatDue = (d) => {
    if (!d) return '';
    const date = new Date(d + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };

  return (
    <div>
      <div className="task-row"
        draggable={!hideDrag}
        onDragStart={!hideDrag ? (e) => {
          if (!e.target.closest('.drag-handle')) { e.preventDefault(); return; }
          onDragStart(e, idx);
        } : undefined}
        onDragOver={!hideDrag ? (e) => onDragOver(e, idx) : undefined}
        onDrop={!hideDrag ? (e) => onDrop(e, idx) : undefined}
        onDragEnd={!hideDrag ? onDragEnd : undefined}
        style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:8, opacity: isDone ? 0.45 : 1 }}>

        {/* Drag handle */}
        {!hideDrag && (
          <span className="drag-handle"
            onTouchStart={(e) => onTouchStart(e, idx)}
            onTouchMove={(e) => onTouchMove(e, idx)}
            onTouchEnd={onTouchEnd}
            style={{ fontSize:14, color:'#3a3a55', lineHeight:1, padding:'2px 2px' }}>≡</span>
        )}

        {/* Checkbox */}
        <button onClick={toggleDone}
          style={{ width:18, height:18, borderRadius:4, border:`1.5px solid ${isDone ? '#00e676' : '#2a2a40'}`, background: isDone ? 'rgba(0,230,118,0.15)' : 'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, padding:0 }}>
          {isDone && <span style={{ color:'#00e676', fontSize:11, lineHeight:1 }}>✓</span>}
        </button>

        {/* Priority badge */}
        {task.priority && task.priority !== 'none' && (
          <button onClick={cyclePriority}
            style={{ fontSize:9, fontWeight:600, padding:'2px 6px', borderRadius:99, letterSpacing:'0.04em', textTransform:'uppercase', color:pr.color, background:pr.bg, border:'none', cursor:'pointer', flexShrink:0, lineHeight:1.3 }}>
            {pr.label}
          </button>
        )}
        {(!task.priority || task.priority === 'none') && (
          <button onClick={cyclePriority}
            style={{ fontSize:9, padding:'2px 6px', borderRadius:99, color:'#3a3a55', background:'transparent', border:'1px solid #1a1a2a', cursor:'pointer', flexShrink:0, lineHeight:1.3 }}>
            pri
          </button>
        )}

        {/* Title */}
        <span onClick={onToggleExpand}
          style={{ flex:1, fontSize:13, color: isDone ? '#4a4a6a' : '#d8d8e8', textDecoration: isDone ? 'line-through' : 'none', cursor:'pointer', minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
          {task.title}
        </span>

        {/* Label chips */}
        {(task.labels || []).length > 0 && (
          <div style={{ display:'flex', gap:3, flexShrink:0 }}>
            {(task.labels || []).slice(0, 3).map(l => {
              const lc = LABEL_COLORS[l] || DEFAULT_LABEL_COLOR;
              return <span key={l} style={{ fontSize:9, fontWeight:600, padding:'1px 6px', borderRadius:99, color:lc.color, background:lc.bg, letterSpacing:'0.04em', maxWidth:70, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{l}</span>;
            })}
            {(task.labels || []).length > 3 && <span style={{ fontSize:9, color:'#4a4a6a' }}>+{task.labels.length - 3}</span>}
          </div>
        )}

        {/* Project label (global tasks view) */}
        {projectLabel && (
          <button onClick={(e) => { e.stopPropagation(); onOpenProject && onOpenProject(); }}
            style={{ fontSize:9, fontWeight:500, padding:'2px 8px', borderRadius:5, background:'#18182a', color:'#7070a0', border:'none', cursor:'pointer', flexShrink:0, lineHeight:1.3, maxWidth:100, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {projectLabel}
          </button>
        )}

        {/* Status badge */}
        <button onClick={cycleStatus}
          style={{ fontSize:9, fontWeight:600, padding:'2px 7px', borderRadius:99, letterSpacing:'0.04em', textTransform:'uppercase', color:ts.color, background:ts.bg, border:'none', cursor:'pointer', flexShrink:0, lineHeight:1.3 }}>
          {ts.label}
        </button>

        {/* Due date (compact) */}
        {task.dueDate && (
          <span style={{ fontSize:10, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace", flexShrink:0 }}>
            {formatDue(task.dueDate)}
          </span>
        )}

        {/* Delete */}
        <button className="icon-btn" onClick={(e) => { e.stopPropagation(); onDelete(projectId, task.id); }}
          style={{ background:'transparent', border:'none', color:'#ef5350', fontSize:13, padding:'2px 4px', borderRadius:4, cursor:'pointer', flexShrink:0 }}>✕</button>
      </div>

      {/* Expanded panel */}
      {expanded && (
        <div style={{ marginLeft:36, padding:'10px 14px', background:'#0c0c16', borderRadius:8, border:'1px solid #1a1a2a', marginTop:2, marginBottom:4, display:'flex', flexDirection:'column', gap:10 }}>
          <div>
            <label style={{ fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>Description</label>
            <textarea value={desc} onChange={e => setDesc(e.target.value)} onBlur={saveDesc}
              placeholder="Add details…"
              style={{ width:'100%', background:'#10101a', border:'1px solid #1a1a2a', borderRadius:6, padding:'8px 10px', color:'#d8d8e8', fontSize:13, outline:'none', lineHeight:1.5, fontFamily:"'DM Sans',sans-serif" }}
              rows={3}/>
          </div>
          <div style={{ display:'flex', gap:14, flexWrap:'wrap', alignItems:'center' }}>
            <div>
              <label style={{ fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>Due Date</label>
              <input type="date" value={dueDate} onChange={e => saveDueDate(e.target.value)}
                style={{ background:'#10101a', border:'1px solid #1a1a2a', borderRadius:6, padding:'6px 10px', color:'#d8d8e8', fontSize:12, outline:'none', fontFamily:"'JetBrains Mono',monospace" }}/>
            </div>
            <div>
              <label style={{ fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>Status</label>
              <select value={task.status} onChange={e => {
                const updates = { status: e.target.value };
                if (e.target.value === 'done') updates.completedAt = now();
                else updates.completedAt = null;
                onUpdate(projectId, task.id, updates);
              }}
                style={{ background:'#10101a', border:'1px solid #1a1a2a', borderRadius:6, padding:'6px 10px', color:'#d8d8e8', fontSize:12, outline:'none' }}>
                {Object.entries(TASK_STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>GitHub Link</label>
              <input value={task.githubLink || ''} onChange={e => onUpdate(projectId, task.id, { githubLink: e.target.value || null })}
                placeholder="#123 or SHA or URL"
                style={{ background:'#10101a', border:'1px solid #1a1a2a', borderRadius:6, padding:'6px 10px', color:'#d8d8e8', fontSize:12, outline:'none', fontFamily:"'JetBrains Mono',monospace", width:180 }}/>
            </div>
          </div>
          {/* Labels */}
          <div>
            <label style={{ fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:6 }}>Labels</label>
            <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:6 }}>
              {Object.keys(LABEL_COLORS).map(l => {
                const on = (task.labels || []).includes(l);
                const lc = LABEL_COLORS[l];
                return (
                  <button key={l} onClick={() => {
                    const labels = (task.labels || []);
                    onUpdate(projectId, task.id, { labels: on ? labels.filter(x => x !== l) : [...labels, l] });
                  }}
                    style={{ fontSize:10, fontWeight:600, padding:'3px 8px', borderRadius:99, border:`1px solid ${on ? lc.color : '#1a1a2a'}`, background: on ? lc.bg : 'transparent', color: on ? lc.color : '#4a4a6a', cursor:'pointer', letterSpacing:'0.04em' }}>
                    {l}
                  </button>
                );
              })}
            </div>
            <div style={{ display:'flex', gap:4, alignItems:'center', flexWrap:'wrap' }}>
              {(task.labels || []).filter(l => !LABEL_COLORS[l]).map(l => (
                <span key={l} style={{ fontSize:10, fontWeight:600, padding:'2px 7px', borderRadius:99, color:'#4a4a6a', background:'rgba(74,74,106,0.10)', display:'flex', alignItems:'center', gap:3 }}>
                  {l} <span onClick={() => onUpdate(projectId, task.id, { labels: (task.labels || []).filter(x => x !== l) })} style={{ cursor:'pointer', color:'#ef5350', fontSize:8 }}>✕</span>
                </span>
              ))}
              <input placeholder="+ custom" onKeyDown={e => {
                if (e.key === 'Enter' && e.target.value.trim()) {
                  const val = e.target.value.trim().toLowerCase();
                  if (!(task.labels || []).includes(val)) onUpdate(projectId, task.id, { labels: [...(task.labels || []), val] });
                  e.target.value = '';
                }
              }}
                style={{ background:'transparent', border:'1px solid #1a1a2a', borderRadius:6, padding:'3px 8px', color:'#d8d8e8', fontSize:10, outline:'none', width:80 }}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Search Overlay ────────────────────────────────────────────────────────────
function SearchOverlay({ projects, ideas, onClose, onOpenProject, onOpenIdeas }) {
  const [query, setQuery] = useState('');
  const [hlIdx, setHlIdx] = useState(0);
  const inputRef = useRef(null);
  const debounceRef = useRef(null);
  const [debouncedQ, setDebouncedQ] = useState('');

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => setDebouncedQ(query), 150);
    return () => clearTimeout(debounceRef.current);
  }, [query]);
  useEffect(() => { setHlIdx(0); }, [debouncedQ]);

  const results = useMemo(() => {
    const q = debouncedQ.toLowerCase().trim();
    if (q.length < 2) {
      // Show recent projects
      return { projects: [...projects].sort((a, b) => new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0)).slice(0, 5).map(p => ({ ...p, _type: 'project' })), tasks: [], ideas: [] };
    }
    const matchProjects = projects.filter(p =>
      (p.name || '').toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q) || (p.notes || '').toLowerCase().includes(q)
    ).slice(0, 5).map(p => ({ ...p, _type: 'project' }));

    const matchTasks = projects.flatMap(p =>
      (p.tasks || []).filter(t => (t.title || '').toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q))
        .map(t => ({ ...t, projectId: p.id, projectName: p.name, _type: 'task' }))
    ).slice(0, 5);

    const matchIdeas = ideas.filter(i => (i.text || '').toLowerCase().includes(q))
      .slice(0, 5).map(i => ({ ...i, _type: 'idea' }));

    return { projects: matchProjects, tasks: matchTasks, ideas: matchIdeas };
  }, [debouncedQ, projects, ideas]);

  const flat = [...results.projects, ...results.tasks, ...results.ideas];

  const handleKey = (e) => {
    if (e.key === 'Escape') { onClose(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setHlIdx(i => Math.min(i + 1, flat.length - 1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setHlIdx(i => Math.max(i - 1, 0)); }
    if (e.key === 'Enter' && flat[hlIdx]) { select(flat[hlIdx]); }
  };

  const select = (item) => {
    if (item._type === 'project') { onOpenProject(item.id); onClose(); }
    else if (item._type === 'task') { onOpenProject(item.projectId, item.id); onClose(); }
    else if (item._type === 'idea') { onOpenIdeas(); onClose(); }
  };

  const highlight = (text, q) => {
    if (!q || q.length < 2) return text;
    const idx = (text || '').toLowerCase().indexOf(q.toLowerCase());
    if (idx < 0) return text;
    return <>{text.slice(0, idx)}<span style={{ color:'#00e676' }}>{text.slice(idx, idx + q.length)}</span>{text.slice(idx + q.length)}</>;
  };

  let globalIdx = -1;
  const ResultRow = ({ item, children }) => {
    globalIdx++;
    const myIdx = globalIdx;
    const active = myIdx === hlIdx;
    return (
      <div onClick={() => select(item)}
        onMouseEnter={() => setHlIdx(myIdx)}
        style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 12px', borderRadius:8, cursor:'pointer', background: active ? '#1a1a2a' : 'transparent', borderLeft: active ? '2px solid #00e676' : '2px solid transparent', transition:'background .1s' }}>
        {children}
      </div>
    );
  };

  const SectionLabel = ({ label }) => (
    <div style={{ fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.06em', textTransform:'uppercase', padding:'10px 12px 4px' }}>{label}</div>
  );

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', backdropFilter:'blur(6px)', display:'flex', alignItems:'flex-start', justifyContent:'center', zIndex:300, padding:'80px 16px 16px' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="fade-in" style={{ width:'100%', maxWidth:560, background:'#10101a', border:'1px solid #252538', borderRadius:16, overflow:'hidden' }}>
        <div style={{ padding:'16px 18px', borderBottom:'1px solid #18182a' }}>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)} onKeyDown={handleKey}
            placeholder="Search projects, tasks, ideas…"
            style={{ width:'100%', background:'transparent', border:'none', color:'#d8d8e8', fontSize:15, outline:'none' }}/>
        </div>
        <div style={{ maxHeight:400, overflowY:'auto', padding:'4px 6px 10px' }}>
          {results.projects.length > 0 && <>
            <SectionLabel label={debouncedQ.length < 2 ? 'Recent Projects' : `Projects (${results.projects.length})`} />
            {results.projects.map(p => (
              <ResultRow key={p.id} item={p}>
                <span style={{ color:'#29b6f6', fontSize:12, flexShrink:0 }}>◈</span>
                <span style={{ flex:1, fontSize:13, color:'#d8d8e8', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{highlight(p.name, debouncedQ)}</span>
              </ResultRow>
            ))}

          {results.tasks.length > 0 && <>
            <SectionLabel label={`Tasks (${results.tasks.length})`} />
            {results.tasks.map(t => (
              <ResultRow key={t.id} item={t}>
                <span style={{ fontSize:11, flexShrink:0 }}>{t.status === 'done' ? '✓' : '□'}</span>
                <span style={{ flex:1, fontSize:13, color:'#d8d8e8', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{highlight(t.title, debouncedQ)}</span>
                <span style={{ fontSize:10, color:'#4a4a6a', flexShrink:0 }}>{t.projectName} →</span>
              </ResultRow>
            ))}
          </>}
          {results.ideas.length > 0 && <>
            <SectionLabel label={`Ideas (${results.ideas.length})`} />
            {results.ideas.map(i => (
              <ResultRow key={i.id} item={i}>
                <span style={{ fontSize:11, flexShrink:0 }}>💡</span>
                <span style={{ flex:1, fontSize:13, color:'#d8d8e8', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{highlight(i.text, debouncedQ)}</span>
              </ResultRow>
            ))}
          </>}
          {flat.length === 0 && debouncedQ.length >= 2 && (
            <div style={{ textAlign:'center', padding:'24px 0', color:'#3a3a55', fontSize:13 }}>No results found.</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Labels View ───────────────────────────────────────────────────────────────
function LabelsView({ projects, onOpenProject }) {
  const [selectedLabel, setSelectedLabel] = useState(null);

  const { labelCounts, labelTasks } = useMemo(() => {
    const counts = {};
    const tasks = {};
    projects.forEach(p => {
      (p.tasks || []).forEach(t => {
        (t.labels || []).forEach(l => {
          counts[l] = (counts[l] || 0) + 1;
          if (!tasks[l]) tasks[l] = [];
          tasks[l].push({ ...t, projectId: p.id, projectName: p.name });
        });
      });
    });
    return { labelCounts: counts, labelTasks: tasks };
  }, [projects]);

  const sortedLabels = useMemo(() =>
    Object.entries(labelCounts).sort((a, b) => b[1] - a[1]),
    [labelCounts]
  );

  const active = selectedLabel || (sortedLabels[0] ? sortedLabels[0][0] : null);
  const tasksForLabel = (active && labelTasks[active]) || [];

  // Group tasks by project
  const grouped = useMemo(() => {
    const g = {};
    tasksForLabel.forEach(t => {
      if (!g[t.projectId]) g[t.projectId] = { name: t.projectName, tasks: [] };
      g[t.projectId].tasks.push(t);
    });
    return Object.entries(g);
  }, [tasksForLabel]);

  if (sortedLabels.length === 0) {
    return <div style={{ padding:'22px 20px' }} className="fade-in"><div style={{ textAlign:'center', padding:'60px 20px', color:'#3a3a55', fontSize:14 }}>No labels in use. Add labels to tasks from the project detail view.</div></div>;
  }

  return (
    <div style={{ padding:'22px 20px' }} className="fade-in">
      <div style={{ display:'grid', gridTemplateColumns:'200px 1fr', gap:16, alignItems:'start' }} className="detail-panels">
        {/* Label list */}
        <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:14 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, fontWeight:700, letterSpacing:'0.06em', color:'#fff', textTransform:'uppercase', marginBottom:10 }}>Labels ({sortedLabels.length})</div>
          <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
            {sortedLabels.map(([label, count]) => {
              const lc = LABEL_COLORS[label] || DEFAULT_LABEL_COLOR;
              const isActive = label === active;
              return (
                <button key={label} onClick={() => setSelectedLabel(label)}
                  style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'7px 10px', borderRadius:7, border:'none', background: isActive ? '#1a1a2a' : 'transparent', cursor:'pointer', textAlign:'left', borderLeft: isActive ? `2px solid ${lc.color}` : '2px solid transparent' }}>
                  <span style={{ fontSize:12, color: isActive ? lc.color : '#7070a0', fontWeight: isActive ? 600 : 400 }}>{label}</span>
                  <span style={{ fontSize:10, color:'#3a3a55', fontFamily:"'JetBrains Mono',monospace" }}>{count}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Tasks for label */}
        <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, fontWeight:700, letterSpacing:'0.06em', color:'#fff', textTransform:'uppercase', marginBottom:14 }}>
            Tasks labeled "{active}" ({tasksForLabel.length})
          </div>
          {grouped.map(([pid, { name, tasks }]) => (
            <div key={pid} style={{ marginBottom:14 }}>
              <div onClick={() => onOpenProject(pid)}
                style={{ fontSize:12, fontWeight:600, color:'#7070a0', cursor:'pointer', marginBottom:6 }}>{name} ({tasks.length})</div>
              {tasks.map(t => {
                const ts = TASK_STATUS[t.status] || TASK_STATUS.todo;
                const pr = PRIORITY[t.priority] || PRIORITY.medium;
                return (
                  <div key={t.id} onClick={() => onOpenProject(pid, t.id)}
                    style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:6, cursor:'pointer', transition:'background .12s' }}
                    onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.025)'}
                    onMouseOut={e => e.currentTarget.style.background='transparent'}>
                    <span style={{ fontSize:10 }}>{t.status === 'done' ? '✓' : '□'}</span>
                    <span style={{ flex:1, fontSize:13, color: t.status === 'done' ? '#4a4a6a' : '#d8d8e8', textDecoration: t.status === 'done' ? 'line-through' : 'none' }}>{t.title}</span>
                    {t.priority !== 'none' && <span style={{ fontSize:9, fontWeight:600, padding:'2px 6px', borderRadius:99, color:pr.color, background:pr.bg, textTransform:'uppercase' }}>{pr.label}</span>}
                    {t.dueDate && <span style={{ fontSize:10, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>{new Date(t.dueDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>}
                  </div>

              })}
