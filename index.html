// ── Utilities ──────────────────────────────────────────────────────────────────
const uid  = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const now  = () => new Date().toISOString();
const ago  = (iso) => {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  return d === 0 ? 'Today' : d === 1 ? 'Yesterday' : `${d}d ago`;
};

function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary);
}
function fromBase64(b64) {
  const binary = atob(b64.replace(/\n/g, ''));
  const bytes  = Uint8Array.from(binary, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

// ── Data normalization ────────────────────────────────────────────────────────
const normalizeSubtask = (s, idx) => ({
  id: s.id, title: s.title || '', status: s.status || 'todo',
  order: s.order ?? idx, createdAt: s.createdAt || new Date().toISOString(),
});

const normalizeTask = (t, idx) => {
  const nt = { description: '', priority: 'medium', dueDate: null, order: idx, completedAt: null, labels: [], subtasks: [], githubLink: null, milestoneId: null, ...t };
  if (nt.order == null) nt.order = idx;
  nt.subtasks = (nt.subtasks || []).map((s, i) => normalizeSubtask(s, i));
  return nt;
};

const normalizeProject = (p, idx) => {
  const np = { priority: 'none', order: idx, tasks: [], milestones: [], hidden: false, ...p };
  if (np.order == null) np.order = idx;
  np.tasks = (np.tasks || []).map((t, i) => normalizeTask(t, i));
  np.milestones = (np.milestones || []).map(m => ({ ...m, taskIds: [] }));
  // Rebuild milestone.taskIds from task.milestoneId
  np.tasks.forEach(t => {
    if (t.milestoneId) {
      const ms = np.milestones.find(m => m.id === t.milestoneId);
      if (ms) ms.taskIds.push(t.id);
    }
  });
  return np;
};

const normalizeData = (data) => ({
  projects: (data.projects || []).map((p, i) => normalizeProject(p, i)),
  ideas: data.ideas || [],
  _syncedRepos: data._syncedRepos || [],
});

// ── GitHub repo auto-sync ─────────────────────────────────────────────────────
function repoSlug(repoField) {
  if (!repoField) return null;
  return repoField.replace(/^https?:\/\//, '').replace(/^github\.com\//, '').replace(/\/$/, '').toLowerCase();
}

async function detectAIModel(creds, owner, repoName) {
  try {
    const res = await fetch(`https://api.github.com/repos/${owner}/${repoName}/commits?per_page=10`, {
      headers: { Authorization: `Bearer ${creds.token}`, Accept: 'application/vnd.github.v3+json' },
    });
    if (!res.ok) return '';
    const commits = await res.json();
    const text = commits.map(c => (c.commit?.message || '')).join('\n').toLowerCase();
    if (/co-authored-by:\s*claude|generated with.*claude|claude code|🤖.*claude/i.test(text)) return 'Claude';
    if (/co-authored-by:\s*(github[- ]?copilot|copilot)/i.test(text)) return 'ChatGPT/Sol';
    if (/generated with.*chatgpt|generated with.*gpt|gpt-[0-9]/i.test(text)) return 'ChatGPT/Sol';
    if (/generated with.*gemini|co-authored-by:\s*gemini/i.test(text)) return 'Gemini';
    return '';
  } catch { return ''; }
}

async function syncGitHubRepos(creds, existingProjects, syncedRepos) {
  try {
    const res = await fetch('https://api.github.com/user/repos?type=owner&sort=pushed&per_page=100', {
      headers: { Authorization: `Bearer ${creds.token}`, Accept: 'application/vnd.github.v3+json' },
    });
    if (!res.ok) return null;
    const repos = await res.json();

    const existingSlugs = new Set(existingProjects.map(p => repoSlug(p.repo)).filter(Boolean));
    const syncedSet = new Set(syncedRepos.map(s => s.toLowerCase()));
    const newProjects = [];
    const allSlugs = [...syncedRepos];
    const now14 = Date.now() - 14 * 86400000;
    const now90 = Date.now() - 90 * 86400000;

    for (const r of repos) {
      if (r.fork || r.archived) continue;
      const slug = `${r.owner.login}/${r.name}`.toLowerCase();
      if (!syncedSet.has(slug)) allSlugs.push(slug);
      if (existingSlugs.has(slug) || syncedSet.has(slug)) continue;

      const pushed = new Date(r.pushed_at || 0).getTime();
      const status = pushed > now14 ? 'active' : pushed > now90 ? 'paused' : 'archived';
      const aiModel = await detectAIModel(creds, r.owner.login, r.name);

      newProjects.push(normalizeProject({
        id: uid(), name: r.name, description: r.description || '',
        status, priority: 'none', aiModel,
        repo: `github.com/${r.full_name}`, notes: '',
        createdAt: r.created_at, lastUpdated: r.pushed_at || r.created_at,
        tasks: [], milestones: [],
      }, existingProjects.length + newProjects.length));
    }

    return { newProjects, _syncedRepos: allSlugs };
  } catch { return null; }
}

// ── Phase 2 utilities ─────────────────────────────────────────────────────────
function relativeTime(iso) {
  if (!iso) return '';
  const seconds = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (seconds < 60) return 'just now';
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
  if (seconds < 604800) return `${Math.floor(seconds / 86400)}d ago`;
  return `${Math.floor(seconds / 604800)}w ago`;
}

function parseRepo(repoField) {
  if (!repoField) return null;
  const clean = repoField.replace(/^https?:\/\//, '').replace(/^github\.com\//, '').replace(/\/$/, '');
  const parts = clean.split('/');
  if (parts.length < 2) return null;
  return { owner: parts[0], repoName: parts[1] };
}

// ── Markdown parser ───────────────────────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inl = s => esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  let html = '', inCode = false, inList = false, codeBlock = '';
  for (const line of text.split('\n')) {
    if (line.startsWith('```')) {
      if (inCode) { html += '<pre><code>' + esc(codeBlock.trimEnd()) + '</code></pre>'; codeBlock = ''; }
      inCode = !inCode;
      continue;
    }
    if (inCode) { codeBlock += line + '\n'; continue; }
    const isList = /^[-*] /.test(line) || /^\d+\.\s/.test(line);
    if (inList && !isList) { html += '</ul>'; inList = false; }
    if (isList && !inList) { html += '<ul>'; inList = true; }
    if (line.startsWith('### ')) html += '<h3>' + inl(line.slice(4)) + '</h3>';
    else if (line.startsWith('## ')) html += '<h2>' + inl(line.slice(3)) + '</h2>';
    else if (line.startsWith('# ')) html += '<h1>' + inl(line.slice(2)) + '</h1>';
    else if (/^-{3,}$/.test(line.trim())) html += '<hr/>';
    else if (/^[-*] /.test(line)) html += '<li>' + inl(line.slice(2)) + '</li>';
    else if (/^\d+\.\s/.test(line)) html += '<li>' + inl(line.replace(/^\d+\.\s/, '')) + '</li>';
    else if (!line.trim()) html += '<br/>';
    else html += '<p>' + inl(line) + '</p>';
  }
  if (inList) html += '</ul>';
  if (inCode) html += '<pre><code>' + esc(codeBlock.trimEnd()) + '</code></pre>';
  return html;
}

// ── GitHub API ─────────────────────────────────────────────────────────────────
async function ghRequest(creds, method, path, body) {
  const res = await fetch(`https://api.github.com/repos/${creds.owner}/${creds.repo}/contents/${path}`, {
    method,
    headers: {
      Authorization: `Bearer ${creds.token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub ${res.status}`);
  }
  return res.json();
}

async function loadFromGH(creds) {
  const file = await ghRequest(creds, 'GET', DATA_FILE);
  return {
    data: JSON.parse(fromBase64(file.content)),
    sha:  file.sha,
  };
}

async function saveToGH(creds, data, sha) {
  const body = {
    message: `devlab: sync ${new Date().toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}`,
    content: toBase64(JSON.stringify(data, null, 2)),
  };
  if (sha) body.sha = sha;
  const result = await ghRequest(creds, 'PUT', DATA_FILE, body);
  return result.content.sha;
}

// ── Landing Page ──────────────────────────────────────────────────────────────

    const creds = { owner: owner.trim(), repo: repo.trim(), token: token.trim() };
    try {
      await ghRequest(creds, 'GET', DATA_FILE);

    { icon: '🗣', title: 'Siri quick-capture', desc: '"Hey Siri, DevLab Idea" — capture ideas from your phone, watch, or Mac.' },
  ];

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg)', color:'var(--text-primary)', fontFamily:"'DM Sans',sans-serif" }}>

              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
            <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:36, fontWeight:700, letterSpacing:'0.14em', color:'var(--text-primary)' }}>DEV LAB</span>
          </div>
          <p style={{ fontSize:18, color:'var(--text-faint)', lineHeight:1.7, maxWidth:540, margin:'0 auto 12px' }}>
            A personal project management tool for solo developers. Track projects, tasks, ideas, and milestones — all backed by Git.
          </p>
          <p style={{ fontSize:13, color:'var(--text-dimmer)', lineHeight:1.6 }}>
            Single-file React app. No build step. No database. Just a GitHub repo and a browser.
          </p>
        </div>

        {/* Features grid */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(220px, 1fr))', gap:16, marginBottom:48 }}>
          {features.map(f => (
            <div key={f.title} style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'20px 18px' }}>
              <div style={{ fontSize:18, marginBottom:8 }}>{f.icon}</div>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, color:'var(--text-primary)', letterSpacing:'0.03em', marginBottom:6 }}>{f.title}</div>
              <div style={{ fontSize:12.5, color:'var(--text-faint)', lineHeight:1.6 }}>{f.desc}</div>
            </div>
          ))}
        </div>

        {/* CTA */}
        <div style={{ textAlign:'center', marginBottom:48 }}>
          <a href="https://github.com/Brian-Caylor/devlab" target="_blank" rel="noopener noreferrer"
            style={{ display:'inline-flex', alignItems:'center', gap:8, padding:'14px 28px', background:'#00e676', color:'#000', borderRadius:10, fontSize:15, fontWeight:600, textDecoration:'none', transition:'opacity .15s' }}
            onMouseOver={e => e.currentTarget.style.opacity='0.85'}
            onMouseOut={e => e.currentTarget.style.opacity='1'}>
            Clone on GitHub →
          </a>
          <p style={{ fontSize:12, color:'var(--text-dimmer)', marginTop:14, lineHeight:1.6 }}>
            Clone the repo, deploy to Netlify, connect your GitHub PAT — running in under 10 minutes.
          </p>
        </div>

        {/* Tech footer */}
        <div style={{ textAlign:'center', borderTop:'1px solid var(--border)', paddingTop:24 }}>
          <div style={{ display:'flex', justifyContent:'center', gap:16, flexWrap:'wrap', marginBottom:12 }}>
            {['React 18', 'GitHub API', 'Netlify', 'Claude API', 'Zero dependencies'].map(t => (
              <span key={t} style={{ fontSize:10, padding:'3px 10px', borderRadius:5, background:'var(--border)', color:'var(--text-muted)', fontFamily:"'JetBrains Mono',monospace" }}>{t}</span>
            ))}
          </div>
          <p style={{ fontSize:11, color:'var(--text-dimmer)' }}>
            Built by <a href="https://github.com/Brian-Caylor" target="_blank" rel="noopener noreferrer" style={{ color:'#29b6f6', textDecoration:'none' }}>Brian Caylor</a>
            {' · '}
            <span onClick={() => setShowConnect(!showConnect)} style={{ color:'var(--text-dimmer)', cursor:'pointer' }}>connect</span>
          </p>
        </div>

        {/* Hidden connect form — for owner setup */}
        {showConnect && (
          <div style={{ maxWidth:400, margin:'32px auto 0', background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:12, padding:24 }}>
            <div style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:16 }}>Connect Your Instance</div>
            <div style={{ marginBottom:12 }}>
              <label style={labelStyle}>GitHub Owner</label>
              <input value={owner} onChange={e => setOwner(e.target.value)} placeholder="your-github-username" style={inputStyle}/>
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={labelStyle}>Repo Name</label>
              <input value={repo} onChange={e => setRepo(e.target.value)} placeholder="your-repo-name" style={inputStyle}/>
            </div>
            <div style={{ marginBottom:16 }}>
              <label style={labelStyle}>Personal Access Token</label>
              <input type="password" value={token} onChange={e => setToken(e.target.value)} placeholder="ghp_…" style={inputStyle}
                onKeyDown={e => e.key === 'Enter' && handleConnect()}/>
            </div>
            {err && <div style={{ color:'#ef5350', fontSize:12, marginBottom:12 }}>{err}</div>}
            <button onClick={handleConnect} disabled={loading} style={{
              width:'100%', padding:11, background:'#00e676', border:'none', borderRadius:8,
              color:'#000', fontSize:13, fontWeight:600, cursor: loading?'not-allowed':'pointer',
              opacity: loading?.65:1, transition:'opacity .15s',
            }}>
              {loading ? 'Connecting…' : 'Connect & Launch →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────────
function App() {
  const [creds,   setCreds]   = useState(loadCreds);
  const [projects,setProjects]= useState([]);
  const [ideas,   setIdeas]   = useState([]);
  const [sha,     setSha]     = useState(null);
  const [tab,     setTab]     = useState('projects');
  const [filter,  setFilter]  = useState('active');
  const [sortMode,setSortMode]= useState('updated');
  const [modal,   setModal]   = useState(null);
  const [newIdea, setNewIdea] = useState('');
  const [sync,    setSync]    = useState('loading');
  const [syncMsg, setSyncMsg] = useState('');
  const [ready,   setReady]   = useState(false);
  const [view,    setView]    = useState('dashboard');
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [openTaskId, setOpenTaskId] = useState(null);
  const [showSearch, setShowSearch] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [readmeProject, setReadmeProject] = useState(null);
  const [models, setModels] = useState(loadModels);
  const [visibleTabs, setVisibleTabs] = useState(loadVisibleTabs);
  const [theme, setTheme] = useState(loadTheme);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    saveTheme(theme);
  }, [theme]);
  const scrollRef  = useRef(0);
  const ideaRef    = useRef(null);
  const saveTimer  = useRef(null);
  const shaRef     = useRef(sha);
  const projRef    = useRef(projects);
  const ideaStateRef = useRef(ideas);
  const syncedReposRef = useRef([]);
  shaRef.current       = sha;
  projRef.current      = projects;
  ideaStateRef.current = ideas;

  // ── ⌘K shortcut ──
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setShowSearch(true); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // ── Load from GitHub ──
  useEffect(() => {
    if (!creds) return;
    (async () => {
      setSync('loading');
      try {
        const { data, sha: fileSha } = await loadFromGH(creds);
        const nd = normalizeData(data);
        let loadedProjects = nd.projects;
        let loadedSynced = nd._syncedRepos;
        setSha(fileSha);
        shaRef.current = fileSha;
        setIdeas(nd.ideas);
        ideaStateRef.current = nd.ideas;
        setSync('idle');

        // Auto-import repos from GitHub
        const syncResult = await syncGitHubRepos(creds, loadedProjects, loadedSynced);
        if (syncResult && syncResult.newProjects.length > 0) {
          loadedProjects = [...loadedProjects, ...syncResult.newProjects];
          loadedSynced = syncResult._syncedRepos;
          syncedReposRef.current = loadedSynced;
          setProjects(loadedProjects);
          projRef.current = loadedProjects;
          // Save the newly imported projects
          try {
            const newSha = await saveToGH(creds, { projects: loadedProjects, ideas: nd.ideas, _syncedRepos: loadedSynced }, shaRef.current);
            setSha(newSha);
            shaRef.current = newSha;
          } catch {}
        } else {
          syncedReposRef.current = syncResult ? syncResult._syncedRepos : loadedSynced;
          setProjects(loadedProjects);
          projRef.current = loadedProjects;
        }
      } catch (e) {
        if (e.message.includes('404')) {
          setSync('idle');
        } else {
          setSync('error');
          setSyncMsg('Could not load data: ' + e.message);
        }
      }
      setReady(true);
    })();
  }, [creds]);

  // ── Debounced save ──
  const triggerSave = useCallback(() => {
    if (!ready) return;
    clearTimeout(saveTimer.current);
    setSync('saving');
    saveTimer.current = setTimeout(async () => {
      try {
        const newSha = await saveToGH(
          creds,
          { projects: projRef.current, ideas: ideaStateRef.current, _syncedRepos: syncedReposRef.current },
          shaRef.current
        );
        setSha(newSha);
        shaRef.current = newSha;
        setSync('idle');
        setSyncMsg('');
      } catch (e) {
        setSync('error');
        setSyncMsg('Save failed: ' + e.message);
      }
    }, 1800);
  }, [creds, ready]);

  // ── Manual sync ──
  const handleSync = async () => {
    clearTimeout(saveTimer.current);
    setSync('loading');
    try {
      const { data, sha: fileSha } = await loadFromGH(creds);
      const nd = normalizeData(data);
      setProjects(nd.projects);
      projRef.current = nd.projects;
      setIdeas(nd.ideas);
      ideaStateRef.current = nd.ideas;
      syncedReposRef.current = nd._syncedRepos;
      setSha(fileSha);
      shaRef.current = fileSha;
      setSync('idle');
      setSyncMsg('');
    } catch (e) {
      setSync('error');
      setSyncMsg('Sync failed: ' + e.message);
    }
  };

  // ── State helpers ──
  const mutateProjects = (fn) => {
    setProjects(prev => { const next = fn(prev); projRef.current = next; triggerSave(); return next; });
  };
  const mutateIdeas = (fn) => {
    setIdeas(prev => { const next = fn(prev); ideaStateRef.current = next; triggerSave(); return next; });
  };

  // ── Project ops ──
  const saveProject = (data) => {
    if (modal.mode === 'add') {
      mutateProjects(p => [{ ...data, id: uid(), createdAt: now(), tasks: [], order: 0 }, ...p.map(x => ({...x, order: x.order + 1}))]);
    } else {
      mutateProjects(p => p.map(x => x.id === data.id ? { ...x, ...data } : x));
    }
    setModal(null);
  };
  const deleteProject = (id) => {
    if (!window.confirm('Delete this project?')) return;
    mutateProjects(p => p.filter(x => x.id !== id));
    if (activeProjectId === id) { setView('dashboard'); setActiveProjectId(null); }
  };
  const hideProject = (id) => {
    mutateProjects(ps => ps.map(p => p.id === id ? { ...p, hidden: true } : p));
  };
  const unhideProject = (id) => {
    mutateProjects(ps => ps.map(p => p.id === id ? { ...p, hidden: false } : p));
  };

  // ── Project mutation (for detail view) ──
  const updateProject = useCallback((id, changes) => {
    mutateProjects(ps => ps.map(p => p.id === id ? { ...p, ...changes, lastUpdated: now() } : p));
  }, [triggerSave]);

  // ── Task ops ──
  const addTask = useCallback((projectId, title) => {
    const taskId = uid();
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      const newTask = { id: taskId, title, description: '', status: 'todo', priority: 'medium', dueDate: null, order: p.tasks.length, createdAt: now(), completedAt: null };
      return { ...p, tasks: [...p.tasks, newTask], lastUpdated: now() };
    }));
    return taskId;
  }, [triggerSave]);

  const updateTask = useCallback((projectId, taskId, updates) => {
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return { ...p, tasks: p.tasks.map(t => t.id === taskId ? { ...t, ...updates } : t), lastUpdated: now() };
    }));
  }, [triggerSave]);

  const deleteTask = useCallback((projectId, taskId) => {
    if (!window.confirm('Delete this task?')) return;
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return { ...p, tasks: p.tasks.filter(t => t.id !== taskId), lastUpdated: now() };
    }));
  }, [triggerSave]);

  const reorderTasks = useCallback((projectId, reorderedTasks) => {
    mutateProjects(ps => ps.map(p => {
      if (p.id !== projectId) return p;
      return { ...p, tasks: reorderedTasks, lastUpdated: now() };
    }));
  }, [triggerSave]);

  const reorderProjects = useCallback((reordered) => {
    mutateProjects(() => reordered);
    setSortMode('custom');
  }, [triggerSave]);

  // ── Idea ops ──
  const addIdea = () => {
    if (!newIdea.trim()) return;
    mutateIdeas(i => [{ id: uid(), text: newIdea.trim(), createdAt: now() }, ...i]);
    setNewIdea('');
    ideaRef.current?.focus();
  };
  const deleteIdea = (id) => mutateIdeas(i => i.filter(x => x.id !== id));
  const promoteIdea = (idea) => {
    deleteIdea(idea.id);
    setModal({ mode: 'add', data: { name:'', description: idea.text, status:'idea', repo:'', notes:'', aiModel:'Claude', priority:'none' } });
  };

  // ── Navigation ──
  const openProject = useCallback((id, taskId) => {
    scrollRef.current = window.scrollY;
    setActiveProjectId(id);
    setOpenTaskId(taskId || null);
    setView('project');
    window.scrollTo(0, 0);
  }, []);

  const goBack = useCallback(() => {
    setView('dashboard');
    setActiveProjectId(null);
    requestAnimationFrame(() => window.scrollTo(0, scrollRef.current));
  }, []);

  if (!creds) {
    return <LandingPage onSave={(c) => setCreds(c)} />;
  }

  // ── Derived data ──
  const visibleProjects = useMemo(() => projects.filter(p => !p.hidden), [projects]);
  const filtered = visibleProjects.filter(p => filter === 'all' || p.status === filter);
  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sortMode === 'priority') {
      arr.sort((a, b) => {
        const pa = PRIORITY_ORDER[a.priority || 'none'] ?? 4;
        const pb = PRIORITY_ORDER[b.priority || 'none'] ?? 4;
        if (pa !== pb) return pa - pb;
        return new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0);
      });
    } else if (sortMode === 'custom') {
      arr.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    } else {
      arr.sort((a, b) => new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0));
    }
    return arr;
  }, [filtered, sortMode]);

  const counts   = Object.fromEntries(Object.keys(STATUS).map(s => [s, visibleProjects.filter(p => p.status === s).length]));
  const blank    = { name:'', description:'', status:'active', repo:'', notes:'', aiModel:'Claude', priority:'none' };
  const activeProject = projects.find(p => p.id === activeProjectId);

  const syncColor = { loading:'var(--text-dimmer)', saving:'#ffa726', idle:'#7a9a7a', error:'#ef5350' }[sync];
  const syncLabel = { loading:'Loading…', saving:'Saving…', idle:'Synced', error:'Error' }[sync];

  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif", background:'var(--bg)', minHeight:'100vh', color:'var(--text-primary)', maxWidth:1400, margin:'0 auto', padding:'0 clamp(20px, 3vw, 48px)', paddingBottom:80 }}>

      {/* ── Header ── */}
      <div style={{ padding:'24px 0 0', display:'flex', alignItems:'flex-start', justifyContent:'space-between', flexWrap:'wrap', gap:16 }} className="header-row">
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:5 }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#00e676" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
            <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:700, letterSpacing:'0.14em', color:'var(--text-primary)' }}>DEV LAB</span>
            <button onClick={handleSync} title={syncMsg || 'Click to force sync'} style={{ background:'transparent', border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:5, padding:0 }}>
              <span style={{ fontSize:10, fontFamily:"'JetBrains Mono',monospace", color: syncColor, letterSpacing:'0.05em' }}>{syncLabel}</span>
              {(sync === 'loading' || sync === 'saving') && (
                <span style={{ width:6, height:6, borderRadius:'50%', background: syncColor, display:'inline-block' }} className="pulsing" />
              )}
            </button>
          </div>
          <div style={{ fontSize:11, color:'var(--text-faint)', fontFamily:"'JetBrains Mono',monospace" }}>
            {visibleProjects.length} projects · {ideas.length} ideas · {creds.owner}/{creds.repo}
          </div>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ display:'flex', gap:3, background:'var(--surface)', padding:4, borderRadius:10 }}>
            {[
              { key:'projects', label:'Projects' },
              { key:'tasks',    label:'Tasks', badge: visibleProjects.reduce((n, p) => n + (p.tasks || []).filter(t => t.status !== 'done').length, 0) },
              visibleTabs.includes('focus')  && { key:'focus',  label:'Focus' },
              visibleTabs.includes('labels') && { key:'labels', label:'Labels' },
              visibleTabs.includes('digest') && { key:'digest', label:'Digest' },
              { key:'ideas',    label:'Ideas', badge: ideas.length },
            ].filter(Boolean).map(t => (
              <button key={t.key} className="tab-btn"
                style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 14px', borderRadius:7, border:'none', background: tab===t.key && view==='dashboard'?'var(--border-alt)':'transparent', color: tab===t.key && view==='dashboard'?'var(--text-primary)':'var(--text-dimmer)', fontSize:13, cursor:'pointer', fontWeight:500 }}
                onClick={() => { setTab(t.key); if (view !== 'dashboard') { setView('dashboard'); setActiveProjectId(null); } }}>
                {t.label}
                {t.badge > 0 && <span style={{ background:'#ffa726', color:'#000', fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:99 }}>{t.badge}</span>}
              </button>
            ))}
          </div>
          <button className="icon-btn" onClick={() => setShowSearch(true)} title="Search (⌘K)"
            style={{ padding:'9px 11px', background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:9, color:'var(--text-dimmer)', fontSize:14, cursor:'pointer' }}>
            🔍
          </button>
          <button className="icon-btn" onClick={() => setShowSettings(true)}
            title="Settings"
            style={{ padding:'9px 11px', background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:9, color:'var(--text-dimmer)', fontSize:14, cursor:'pointer' }}>
            ⚙
          </button>
        </div>
      </div>

      {/* ── Error Banner ── */}
      {sync === 'error' && syncMsg && (
        <div style={{ margin:'12px 0 0', padding:'10px 16px', background:'rgba(239,83,80,0.08)', border:'1px solid rgba(239,83,80,0.25)', borderRadius:8, fontSize:12, color:'#ef5350', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span>{syncMsg}</span>
          <button onClick={handleSync} style={{ background:'transparent', border:'none', color:'#ef5350', fontSize:12, cursor:'pointer', fontWeight:600 }}>Retry →</button>
        </div>
      )}

      {/* ── Detail View ── */}
      {view === 'project' && activeProject && (
        <ProjectDetail
          project={activeProject}
          onBack={goBack}
          onEdit={() => setModal({ mode:'edit', data:{...activeProject} })}
          onUpdateProject={updateProject}
          onAddTask={addTask}
          onUpdateTask={updateTask}
          onDeleteTask={deleteTask}
          onReorderTasks={reorderTasks}
          creds={creds}
          openTaskId={openTaskId}
          onOpenReadme={setReadmeProject}
        />
      )}

      {/* ── Dashboard: Projects Tab ── */}
      {view === 'dashboard' && tab === 'projects' && (
        <div style={{ padding:'22px 0' }} className="fade-in">
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, flexWrap:'wrap', gap:10 }}>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}>
              <button className="pill"
                style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${filter==='all'?'var(--text-primary)':'var(--border)'}`, background: filter==='all'?'var(--border-alt)':'transparent', color: filter==='all'?'var(--text-primary)':'var(--text-faint)', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
                onClick={() => setFilter('all')}>
                All <span style={{ opacity:.5 }}>{projects.length}</span>
              </button>
              {Object.entries(STATUS).map(([key, cfg]) =>
                counts[key] > 0 && (
                  <button key={key} className="pill"
                    style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${filter===key?cfg.color:'var(--border)'}`, background: filter===key?cfg.bg:'transparent', color: filter===key?cfg.color:'var(--text-faint)', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
                    onClick={() => setFilter(key)}>
                    {cfg.label} <span style={{ opacity:.5 }}>{counts[key]}</span>
                  </button>
                )
              )}
              <select value={sortMode} onChange={e => setSortMode(e.target.value)}
                style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:7, padding:'5px 10px', color:'var(--text-dimmer)', fontSize:11, outline:'none', cursor:'pointer' }}>
                <option value="updated">↕ Last Updated</option>
                <option value="priority">↕ Priority</option>
                <option value="custom">↕ Custom Order</option>
              </select>
            </div>
            <button className="add-btn" onClick={() => setModal({ mode:'add', data:{...blank} })}
              style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 16px', background:'#00e676', color:'#000', border:'none', borderRadius:9, fontSize:13, fontWeight:600, cursor:'pointer', transition:'opacity .15s' }}>
              + New Project
            </button>
          </div>

          <ProjectGrid
            projects={sorted}
            onOpen={openProject}
            onEdit={(p) => setModal({ mode:'edit', data:{...p} })}
            onDelete={deleteProject}
            onHide={hideProject}
            onOpenReadme={setReadmeProject}
            onReorder={reorderProjects}
          />
          {sorted.length === 0 && !ready && (
            <div style={{ color:'var(--text-faint)', fontSize:13, textAlign:'center', padding:'48px 0' }}>Loading your projects…</div>
          )}
          {sorted.length === 0 && ready && (
            <div style={{ color:'var(--text-faint)', fontSize:13, textAlign:'center', padding:'48px 0' }}>No projects here. Start one.</div>
          )}
        </div>
      )}

      {/* ── Dashboard: Digest Tab ── */}
      {view === 'dashboard' && tab === 'digest' && (
        <DigestView projects={visibleProjects} ideas={ideas} />
      )}

      {/* ── Dashboard: Labels Tab ── */}
      {view === 'dashboard' && tab === 'labels' && (
        <LabelsView projects={visibleProjects} onOpenProject={openProject} />
      )}

      {/* ── Dashboard: Focus Tab ── */}
      {view === 'dashboard' && tab === 'focus' && (
        <FocusView projects={visibleProjects} onOpenProject={openProject} />
      )}

      {/* ── Dashboard: Tasks Tab ── */}
      {view === 'dashboard' && tab === 'tasks' && (
        <GlobalTaskList
          projects={visibleProjects}
          onUpdate={updateTask}
          onDelete={deleteTask}
          onOpenProject={openProject}
        />
      )}

      {/* ── Dashboard: Ideas Tab ── */}
      {view === 'dashboard' && tab === 'ideas' && (
        <div style={{ padding:'22px 0' }} className="fade-in">
          <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18, marginBottom:14 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:10, fontWeight:600, color:'#ffa726', letterSpacing:'0.09em', textTransform:'uppercase', marginBottom:12 }}>
              ⚡ Quick Capture
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <textarea ref={ideaRef} value={newIdea}
                onChange={e => setNewIdea(e.target.value)}

// ── Project Grid (dashboard with DnD) ─────────────────────────────────────────
function ProjectGrid({ projects, onOpen, onEdit, onDelete, onHide, onOpenReadme, onReorder }) {
  const dragRef = useRef({ dragIdx: -1, overIdx: -1 });
  const touchRef = useRef({ dragIdx: -1, startY: 0, el: null, rects: [] });

  const handleDragStart = (e, idx) => {
    dragRef.current.dragIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.style.opacity = '0.4';
  };
  const handleDragOver = (e, idx) => {
    e.preventDefault();
    dragRef.current.overIdx = idx;
  };
  const handleDrop = (e, idx) => {
    e.preventDefault();
    const { dragIdx } = dragRef.current;
    if (dragIdx < 0 || dragIdx === idx) return;
    const arr = [...projects];
    const [moved] = arr.splice(dragIdx, 1);
    arr.splice(idx, 0, moved);
    arr.forEach((p, i) => p.order = i);
    onReorder(arr);
  };
  const handleDragEnd = (e) => {
    e.currentTarget.style.opacity = '1';
    dragRef.current = { dragIdx: -1, overIdx: -1 };
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:14 }} className="projects-grid">
      {projects.map((p, i) => (
        <ProjectCard key={p.id} project={p}
          onOpen={() => onOpen(p.id)}
          onEdit={(e) => { e.stopPropagation(); onEdit(p); }}
          onDelete={(e) => { e.stopPropagation(); onDelete(p.id); }}
          onHide={(e) => { e.stopPropagation(); onHide(p.id); }}
          onOpenReadme={onOpenReadme}
          onDragStart={(e) => handleDragStart(e, i)}
          onDragOver={(e) => handleDragOver(e, i)}
          onDrop={(e) => handleDrop(e, i)}
          onDragEnd={handleDragEnd}
        />
      ))}
    </div>
  );
}
