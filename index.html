          ))}
        </div>
      </div>
    </div>
  );
}

// ── Focus View ────────────────────────────────────────────────────────────────
function FocusView({ projects, onOpenProject }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const weekAhead = new Date(today); weekAhead.setDate(weekAhead.getDate() + 7);

  const allTasks = useMemo(() =>
    projects.flatMap(p => (p.tasks || []).map(t => ({ ...t, projectId: p.id, projectName: p.name }))),
    [projects]
  );

  const urgent = useMemo(() =>
    allTasks.filter(t => t.status !== 'done' && (t.priority === 'critical' || t.priority === 'high'))
      .sort((a, b) => {
        const pa = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
        if (pa !== 0) return pa;
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      }),
    [allTasks]
  );

  const dueSoon = useMemo(() =>
    allTasks.filter(t => {
      if (t.status === 'done' || !t.dueDate) return false;
      const d = new Date(t.dueDate + 'T00:00:00');
      return d <= weekAhead;
    }).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)),
    [allTasks]
  );

  const stalled = useMemo(() => {
    const cutoff = Date.now() - 14 * 86400000;
    return projects.filter(p => p.status === 'active' && new Date(p.lastUpdated || 0) < cutoff);
  }, [projects]);

  const allEmpty = urgent.length === 0 && dueSoon.length === 0 && stalled.length === 0;

  const FocusTask = ({ task }) => {
    const pr = PRIORITY[task.priority] || PRIORITY.medium;
    const dueDate = task.dueDate ? new Date(task.dueDate + 'T00:00:00') : null;
    const isOverdue = dueDate && dueDate < today;
    const isDueToday = dueDate && dueDate.getTime() === today.getTime();
    return (
      <div onClick={() => onOpenProject(task.projectId, task.id)}
        style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:8, cursor:'pointer', transition:'background .12s' }}
        onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.025)'}
        onMouseOut={e => e.currentTarget.style.background='transparent'}>
        {task.priority !== 'none' && (
          <span style={{ fontSize:9, fontWeight:600, padding:'2px 6px', borderRadius:99, textTransform:'uppercase', color:pr.color, background:pr.bg, flexShrink:0 }}>{pr.label}</span>
        )}
        <span style={{ flex:1, fontSize:13, color:'#d8d8e8', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{task.title}</span>
        <span style={{ fontSize:10, color:'#4a4a6a', flexShrink:0, cursor:'pointer' }}>{task.projectName} →</span>
        {dueDate && (
          <span style={{ fontSize:10, fontFamily:"'JetBrains Mono',monospace", flexShrink:0, color: isOverdue ? '#ef5350' : isDueToday ? '#ffa726' : '#4a4a6a' }}>
            {dueDate.toLocaleDateString('en-US', { month:'short', day:'numeric' })}
          </span>
        )}
      </div>
    );
  };

  const SectionHeader = ({ title, count }) => (
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10, marginTop:4 }}>
      <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, letterSpacing:'0.06em', color:'#fff', textTransform:'uppercase' }}>{title}</span>
      {count > 0 && <span style={{ fontSize:10, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>({count})</span>}
    </div>
  );

  return (
    <div style={{ padding:'22px 20px' }} className="fade-in">
      {allEmpty ? (
        <div style={{ textAlign:'center', padding:'60px 20px', color:'#3a3a55', fontSize:14 }}>Nothing urgent. Go build something.</div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {urgent.length > 0 && (
            <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18 }}>
              <SectionHeader title="Critical & High Priority" count={urgent.length} />
              {urgent.map(t => <FocusTask key={t.id} task={t} />)}
            </div>
          )}
          {dueSoon.length > 0 && (
            <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18 }}>
              <SectionHeader title="Due Soon" count={dueSoon.length} />
              {dueSoon.map(t => <FocusTask key={t.id} task={t} />)}
            </div>
          )}
          {stalled.length > 0 && (
            <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18 }}>
              <SectionHeader title="Stalled Projects" count={stalled.length} />
              {stalled.map(p => (
                <div key={p.id} onClick={() => onOpenProject(p.id)}
                  style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:8, cursor:'pointer', transition:'background .12s' }}
                  onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.025)'}
                  onMouseOut={e => e.currentTarget.style.background='transparent'}>
                  <span style={{ fontSize:12, color:'#ffa726' }}>⚠</span>
                  <span style={{ flex:1, fontSize:13, color:'#7070a0' }}>{p.name}</span>
                  <span style={{ fontSize:10, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>no activity for {Math.floor((Date.now() - new Date(p.lastUpdated || 0)) / 86400000)}d</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── GitHub Activity ───────────────────────────────────────────────────────────
function GitHubActivity({ project, creds }) {
  const [collapsed, setCollapsed] = useState(false);
  const [commits, setCommits] = useState({ loading: true, data: [], error: null });
  const [prs, setPrs] = useState({ loading: true, data: [], error: null });
  const [issues, setIssues] = useState({ loading: true, data: [], error: null });

  const repo = useMemo(() => parseRepo(project.repo), [project.repo]);

  useEffect(() => {
    if (!repo || !creds) return;
    const headers = { Authorization: `Bearer ${creds.token}`, Accept: 'application/vnd.github.v3+json' };
    const base = `https://api.github.com/repos/${repo.owner}/${repo.repoName}`;

    fetch(`${base}/commits?per_page=5`, { headers })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => setCommits({ loading: false, data, error: null }))
      .catch(e => setCommits({ loading: false, data: [], error: String(e) }));

    fetch(`${base}/pulls?state=open&per_page=10`, { headers })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => setPrs({ loading: false, data, error: null }))
      .catch(e => setPrs({ loading: false, data: [], error: String(e) }));

    fetch(`${base}/issues?state=open&per_page=10`, { headers })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => setIssues({ loading: false, data: data.filter(i => !i.pull_request), error: null }))
      .catch(e => setIssues({ loading: false, data: [], error: String(e) }));
  }, [project.id, repo, creds]);

  if (!repo) return null;

  const prCount = prs.data.length;
  const issueCount = issues.data.length;
  const lastCommit = commits.data[0] ? relativeTime(commits.data[0].commit?.author?.date) : '';
  const skeleton = <div className="pulsing" style={{ height:14, width:'60%', background:'#18182a', borderRadius:4, margin:'6px 0' }} />;

  const SubSection = ({ title, loading, error, children, emptyMsg }) => (
    <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>{title}</div>
      {loading ? <>{skeleton}{skeleton}</> : error ? (
        <div style={{ fontSize:12, color:'#4a4a6a', fontStyle:'italic' }}>Could not load {title.toLowerCase()}</div>
      ) : children.length === 0 ? (
        <div style={{ fontSize:12, color:'#3a3a55' }}>{emptyMsg}</div>
      ) : children}
    </div>
  );

  return (
    <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18, gridColumn:'1 / -1' }}>
      <button onClick={() => setCollapsed(!collapsed)}
        style={{ display:'flex', width:'100%', justifyContent:'space-between', alignItems:'center', background:'none', border:'none', cursor:'pointer', padding:0, color:'#d8d8e8' }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>
          {collapsed ? '▸' : '▾'} GitHub Activity
        </span>
        <span style={{ fontSize:10, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>
          {!commits.loading && !prs.loading && !issues.loading ? `${prCount} PRs · ${issueCount} issues${lastCommit ? ` · last commit ${lastCommit}` : ''}` : 'Loading…'}
        </span>
      </button>

      {!collapsed && (
        <div style={{ marginTop:14 }}>
          <SubSection title="Recent Commits" loading={commits.loading} error={commits.error} emptyMsg="No commits found">{
            commits.data.map(c => (
              <a key={c.sha} href={c.html_url} target="_blank" rel="noopener noreferrer"
                style={{ display:'flex', alignItems:'baseline', gap:8, padding:'5px 0', fontSize:12, color:'#7070a0', textDecoration:'none' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#29b6f6', fontSize:11, flexShrink:0 }}>{c.sha.slice(0,7)}</span>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{(c.commit?.message || '').split('\n')[0].slice(0,72)}</span>
                <span style={{ color:'#3a3a55', flexShrink:0, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{relativeTime(c.commit?.author?.date)}</span>
              </a>
            ))
          }</SubSection>

          <SubSection title="Pull Requests" loading={prs.loading} error={prs.error} emptyMsg="No open PRs">{
            prs.data.map(pr => (
              <a key={pr.id} href={pr.html_url} target="_blank" rel="noopener noreferrer"
                style={{ display:'flex', alignItems:'baseline', gap:8, padding:'5px 0', fontSize:12, color:'#7070a0', textDecoration:'none' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#00e676', fontSize:11, flexShrink:0 }}>#{pr.number}</span>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{pr.title}</span>
                <span style={{ color:'#3a3a55', flexShrink:0, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{relativeTime(pr.created_at)}</span>
              </a>
            ))
          }</SubSection>

          <SubSection title="Issues" loading={issues.loading} error={issues.error} emptyMsg="No open issues">{
            issues.data.map(iss => (
              <a key={iss.id} href={iss.html_url} target="_blank" rel="noopener noreferrer"
                style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 0', fontSize:12, color:'#7070a0', textDecoration:'none' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#ffa726', fontSize:11, flexShrink:0 }}>#{iss.number}</span>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{iss.title}</span>
                {iss.labels?.slice(0,2).map(l => (
                  <span key={l.id} style={{ fontSize:9, padding:'1px 6px', borderRadius:99, background:`#${l.color}22`, color:`#${l.color}`, flexShrink:0 }}>{l.name}</span>
                ))}
                <span style={{ color:'#3a3a55', flexShrink:0, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{relativeTime(iss.created_at)}</span>
              </a>
            ))
          }</SubSection>
        </div>
      )}
    </div>
  );
}

// ── Global Task List ──────────────────────────────────────────────────────────
function GlobalTaskList({ projects, onUpdate, onDelete, onOpenProject }) {
  const [statusFilter, setStatusFilter] = useState('all');
  const [priorityFilter, setPriorityFilter] = useState('all');
  const [projectFilter, setProjectFilter] = useState('all');
  const [sortBy, setSortBy] = useState('priority');
  const [expandedId, setExpandedId] = useState(null);

  // Flatten all tasks with project context
  const allTasks = useMemo(() =>
    projects.flatMap(p => (p.tasks || []).map(t => ({ ...t, projectId: p.id, projectName: p.name }))),
    [projects]
  );

  // Filter
  const filtered = useMemo(() => {
    let list = allTasks;
    if (statusFilter !== 'all') list = list.filter(t => t.status === statusFilter);
    if (priorityFilter !== 'all') list = list.filter(t => t.priority === priorityFilter);
    if (projectFilter !== 'all') list = list.filter(t => t.projectId === projectFilter);
    return list;
  }, [allTasks, statusFilter, priorityFilter, projectFilter]);

  // Sort
  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sortBy === 'priority') {
      arr.sort((a, b) => {
        const pa = PRIORITY_ORDER[a.priority || 'none'] ?? 4;
        const pb = PRIORITY_ORDER[b.priority || 'none'] ?? 4;
        if (pa !== pb) return pa - pb;
        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      });
    } else if (sortBy === 'due') {
      arr.sort((a, b) => {
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });
    } else if (sortBy === 'recent') {
      arr.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
    } else if (sortBy === 'project') {
      arr.sort((a, b) => a.projectName.localeCompare(b.projectName));
    }
    return arr;
  }, [filtered, sortBy]);

  // Counts for status pills
  const statusCounts = useMemo(() => {
    let base = allTasks;
    if (priorityFilter !== 'all') base = base.filter(t => t.priority === priorityFilter);
    if (projectFilter !== 'all') base = base.filter(t => t.projectId === projectFilter);
    const c = { all: base.length };
    TASK_STATUS_CYCLE.forEach(s => { c[s] = base.filter(t => t.status === s).length; });
    return c;
  }, [allTasks, priorityFilter, projectFilter]);

  // Priority counts
  const priCounts = useMemo(() => {
    let base = allTasks;
    if (statusFilter !== 'all') base = base.filter(t => t.status === statusFilter);
    if (projectFilter !== 'all') base = base.filter(t => t.projectId === projectFilter);
    const c = {};
    PRIORITY_CYCLE.filter(p => p !== 'none').forEach(p => { c[p] = base.filter(t => t.priority === p).length; });
    return c;
  }, [allTasks, statusFilter, projectFilter]);

  // Projects that have tasks
  const projectsWithTasks = useMemo(() =>
    projects.filter(p => (p.tasks || []).length > 0).map(p => ({ id: p.id, name: p.name })),
    [projects]
  );

  // No-op DnD handlers
  const noop = () => {};

  return (
    <div style={{ padding:'22px 20px' }} className="fade-in">
      {/* Filter bar */}
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:18, alignItems:'center' }}>
        {/* Status pills */}
        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
          <button className="pill"
            style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${statusFilter==='all'?'#d8d8e8':'#18182a'}`, background: statusFilter==='all'?'#1a1a2a':'transparent', color: statusFilter==='all'?'#d8d8e8':'#4a4a6a', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
            onClick={() => setStatusFilter('all')}>
            All <span style={{ opacity:.5 }}>{statusCounts.all}</span>
          </button>
          {TASK_STATUS_CYCLE.map(key => {
            const cfg = TASK_STATUS[key];
            return statusCounts[key] > 0 && (
              <button key={key} className="pill"
                style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${statusFilter===key?cfg.color:'#18182a'}`, background: statusFilter===key?cfg.bg:'transparent', color: statusFilter===key?cfg.color:'#4a4a6a', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
                onClick={() => setStatusFilter(statusFilter === key ? 'all' : key)}>
                {cfg.label} <span style={{ opacity:.5 }}>{statusCounts[key]}</span>
              </button>
            );
          })}
        </div>

        {/* Priority pills */}
        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
          {PRIORITY_CYCLE.filter(p => p !== 'none').map(key => {
            const cfg = PRIORITY[key];
            return priCounts[key] > 0 && (
              <button key={key} className="pill"
                style={{ padding:'5px 10px', borderRadius:99, border:`1px solid ${priorityFilter===key?cfg.color:'#18182a'}`, background: priorityFilter===key?cfg.bg:'transparent', color: priorityFilter===key?cfg.color:'#4a4a6a', fontSize:11, fontWeight:500, display:'flex', alignItems:'center', gap:4 }}
                onClick={() => setPriorityFilter(priorityFilter === key ? 'all' : key)}>
                {cfg.label} <span style={{ opacity:.5 }}>{priCounts[key]}</span>
              </button>
            );
          })}
        </div>

        {/* Project filter + Sort */}
        <div style={{ display:'flex', gap:6, marginLeft:'auto', flexWrap:'wrap' }}>
          <select value={projectFilter} onChange={e => setProjectFilter(e.target.value)}
            style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:7, padding:'5px 10px', color:'#4a4a6a', fontSize:11, outline:'none', cursor:'pointer' }}>
            <option value="all">All Projects</option>
            {projectsWithTasks.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)}
            style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:7, padding:'5px 10px', color:'#4a4a6a', fontSize:11, outline:'none', cursor:'pointer' }}>
            <option value="priority">↕ Priority</option>
            <option value="due">↕ Due Date</option>
            <option value="recent">↕ Recently Added</option>
            <option value="project">↕ Project</option>
          </select>
        </div>
      </div>

      {/* Task list */}
      <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'#fff', textTransform:'uppercase' }}>All Tasks</span>
          <span style={{ fontSize:11, color:'#4a4a6a', fontFamily:"'JetBrains Mono',monospace" }}>
            {sorted.filter(t => t.status === 'done').length} / {sorted.length} done
          </span>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
          {sorted.map((task) => (
            <TaskRow key={task.id} task={task} idx={0}
              expanded={expandedId === task.id}
              onToggleExpand={() => setExpandedId(expandedId === task.id ? null : task.id)}
              projectId={task.projectId}
              onUpdate={onUpdate}
              onDelete={onDelete}
              hideDrag={true}
              projectLabel={task.projectName}
              onOpenProject={() => onOpenProject(task.projectId)}
              onDragStart={noop} onDragOver={noop} onDrop={noop} onDragEnd={noop}
              onTouchStart={noop} onTouchMove={noop} onTouchEnd={noop}
            />
          ))}
          {sorted.length === 0 && (
            <div style={{ color:'#3a3a55', fontSize:13, textAlign:'center', padding:'32px 0' }}>
              {allTasks.length === 0 ? 'No tasks yet. Add some from a project.' : 'No tasks match your filters.'}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Notes Panel ───────────────────────────────────────────────────────────────
function NotesPanel({ projectId, initialNotes, onSave }) {
  const [text, setText] = useState(initialNotes);
  const [mode, setMode] = useState('preview');
  const [mobileOpen, setMobileOpen] = useState(false);
  const saveTimerRef = useRef(null);
  const isMobile = typeof window !== 'undefined' && window.innerWidth <= 640;

  const doSave = useCallback((val) => {
    onSave(val);
  }, [onSave]);

  const handleChange = (e) => {
    const val = e.target.value;
    setText(val);
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => doSave(val), 2000);
  };

  const handleBlur = () => {
    clearTimeout(saveTimerRef.current);
    doSave(text);
  };

  const switchMode = (m) => {
    if (mode === 'edit' && m === 'preview') { clearTimeout(saveTimerRef.current); doSave(text); }
    setMode(m);
  };

  // Mobile collapsed
  if (isMobile && !mobileOpen) {
    return (
      <button onClick={() => setMobileOpen(true)}
        style={{ width:'100%', background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:'14px 18px', color:'#7070a0', fontSize:13, cursor:'pointer', textAlign:'left', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'#fff', textTransform:'uppercase' }}>Notes</span>
        <span style={{ fontSize:12, color:'#4a4a6a' }}>▾ Expand</span>
      </button>
    );
  }

  return (
    <div style={{ background:'#10101a', border:'1px solid #18182a', borderRadius:12, padding:18 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'#fff', textTransform:'uppercase' }}>Notes</span>
        <div style={{ display:'flex', gap:2 }}>
          {isMobile && (
            <button onClick={() => setMobileOpen(false)}
              style={{ padding:'4px 10px', borderRadius:6, border:'1px solid #1a1a2a', background:'transparent', color:'#4a4a6a', fontSize:11, cursor:'pointer', marginRight:6 }}>
              ▴ Collapse
            </button>
          )}
          <button onClick={() => switchMode('edit')}
            style={{ padding:'4px 12px', borderRadius:6, border:`1px solid ${mode==='edit'?'#29b6f6':'#1a1a2a'}`, background: mode==='edit'?'rgba(41,182,246,0.10)':'transparent', color: mode==='edit'?'#29b6f6':'#4a4a6a', fontSize:11, cursor:'pointer', fontWeight:500 }}>
            Edit
          </button>
          <button onClick={() => switchMode('preview')}
            style={{ padding:'4px 12px', borderRadius:6, border:`1px solid ${mode==='preview'?'#29b6f6':'#1a1a2a'}`, background: mode==='preview'?'rgba(41,182,246,0.10)':'transparent', color: mode==='preview'?'#29b6f6':'#4a4a6a', fontSize:11, cursor:'pointer', fontWeight:500 }}>
            Preview
          </button>
        </div>
      </div>

      {mode === 'edit' ? (
        <textarea value={text} onChange={handleChange} onBlur={handleBlur}
          placeholder="Write your notes here… supports **markdown**"
          style={{ width:'100%', minHeight:240, background:'#0c0c16', border:'1px solid #1a1a2a', borderRadius:8, padding:'12px 14px', color:'#d8d8e8', fontSize:13, outline:'none', lineHeight:1.65, fontFamily:"'JetBrains Mono',monospace", resize:'vertical' }}/>
      ) : (
        <div className="md-preview"
          style={{ minHeight:100, padding:'4px 0', fontSize:13.5, lineHeight:1.65 }}>
          {text ? (
            <div dangerouslySetInnerHTML={{ __html: renderMarkdown(text) }} />
          ) : (
            <div style={{ color:'#3a3a55', fontSize:13, fontStyle:'italic' }}>No notes yet. Switch to Edit to start writing.</div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Project Modal ──────────────────────────────────────────────────────────────
function ProjectModal({ mode, data, onSave, onClose }) {
  const [form, setForm] = useState({ priority: 'none', ...data });
  const upd    = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
  const toggle = (k, v) => setForm(f => ({ ...f, [k]: (f[k]||[]).includes(v) ? f[k].filter(x=>x!==v) : [...(f[k]||[]),v] }));
  const pick   = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const inputStyle = { width:'100%', background:'#0c0c16', border:'1px solid #1a1a2a', borderRadius:8, padding:'10px 14px', color:'#d8d8e8', fontSize:14, outline:'none', lineHeight:1.5 };
  const labelStyle = { display:'block', fontSize:10, fontWeight:600, color:'#4a4a6a', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:7 };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.8)', backdropFilter:'blur(6px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200, padding:16 }}
      onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ background:'#10101a', border:'1px solid #252538', borderRadius:16, width:'100%', maxWidth:520, maxHeight:'92vh', display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'20px 24px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid #18182a' }}>
          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:21, fontWeight:700, color:'#fff', letterSpacing:'0.05em' }}>
            {mode==='add' ? 'New Project' : 'Edit Project'}
          </span>
          <button className="icon-btn" style={{ padding:'4px 6px', background:'transparent', border:'none', color:'#5a5a7a', borderRadius:5, fontSize:17, cursor:'pointer' }} onClick={onClose}>✕</button>
        </div>

        <div style={{ padding:'20px 24px', overflowY:'auto', display:'flex', flexDirection:'column', gap:18 }}>
          <div>
            <label style={labelStyle}>Name</label>
            <input style={inputStyle} value={form.name||''} onChange={upd('name')} placeholder="Project name"/>
          </div>
          <div>
            <label style={labelStyle}>Description</label>
            <textarea style={inputStyle} value={form.description||''} onChange={upd('description')} placeholder="What does it do?" rows={3}/>
          </div>
          <div>
            <label style={labelStyle}>Status</label>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {Object.entries(STATUS).map(([key, cfg]) => {
                const on = form.status === key;
                return (
                  <button key={key} className="chip-btn"
                    style={{ padding:'5px 12px', borderRadius:7, border:`1px solid ${on?cfg.color:'#1e1e2e'}`, background:on?cfg.bg:'transparent', color:on?cfg.color:'#4a4a6a', fontSize:12, cursor:'pointer' }}
                    onClick={() => pick('status', key)}>
                    {cfg.label}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <label style={labelStyle}>Priority</label>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {Object.entries(PRIORITY).map(([key, cfg]) => {
                const on = (form.priority || 'none') === key;
                return (
                  <button key={key} className="chip-btn"
                    style={{ padding:'5px 12px', borderRadius:7, border:`1px solid ${on ? (key === 'none' ? '#3a3a55' : cfg.color) : '#1e1e2e'}`, background:on ? (key === 'none' ? 'rgba(58,58,85,0.15)' : cfg.bg) : 'transparent', color:on ? (key === 'none' ? '#7070a0' : cfg.color) : '#4a4a6a', fontSize:12, cursor:'pointer' }}
                    onClick={() => pick('priority', key)}>
                    {cfg.label}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <label style={labelStyle}>Machines</label>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {MACHINES.map(m => {
                const on = (form.machines||[]).includes(m);
                return (
                  <button key={m} className="chip-btn"
                    style={{ padding:'5px 12px', borderRadius:7, border:`1px solid ${on?'#00e676':'#1e1e2e'}`, background:on?'rgba(0,230,118,0.10)':'transparent', color:on?'#00e676':'#4a4a6a', fontSize:12, cursor:'pointer' }}
                    onClick={() => toggle('machines', m)}>
                    {m}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <label style={labelStyle}>AI Model Used</label>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {MODELS.map(m => {
                const on = form.aiModel === m;
                return (
                  <button key={m} className="chip-btn"
                    style={{ padding:'5px 12px', borderRadius:7, border:`1px solid ${on?'#29b6f6':'#1e1e2e'}`, background:on?'rgba(41,182,246,0.10)':'transparent', color:on?'#29b6f6':'#4a4a6a', fontSize:12, cursor:'pointer' }}
                    onClick={() => pick('aiModel', m)}>
                    {m}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <label style={labelStyle}>Repo / URL</label>
            <input style={inputStyle} value={form.repo||''} onChange={upd('repo')} placeholder="github.com/Brian-Caylor/repo-name"/>
          </div>
          <div>
            <label style={labelStyle}>Notes / Current State</label>
            <textarea style={inputStyle} value={form.notes||''} onChange={upd('notes')} placeholder="Where things stand, what's next, what's blocked…" rows={3}/>
          </div>
        </div>

        <div style={{ padding:'16px 24px', borderTop:'1px solid #18182a', display:'flex', justifyContent:'flex-end', gap:10 }}>
          <button style={{ padding:'9px 18px', background:'transparent', border:'1px solid #1e1e2e', borderRadius:8, color:'#7070a0', fontSize:14, cursor:'pointer' }} onClick={onClose}>Cancel</button>
          <button
            style={{ padding:'9px 20px', background:'#00e676', border:'none', borderRadius:8, color:'#000', fontSize:14, fontWeight:600, cursor:'pointer', opacity: form.name?.trim()?1:.4, transition:'opacity .15s' }}
            onClick={() => form.name?.trim() && onSave({ ...form, lastUpdated: now() })}>
            {mode==='add' ? 'Add Project' : 'Save Changes'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Mount ──────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
