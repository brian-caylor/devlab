// ── README Modal ──────────────────────────────────────────────────────────────
function ReadmeModal({ project, creds, onClose }) {
  const [state, setState] = useState({ loading: true, content: '', error: null });
  const repo = useMemo(() => parseRepo(project.repo), [project.repo]);

  useEffect(() => {
    if (!repo || !creds) { setState({ loading: false, content: '', error: 'No repo configured' }); return; }
    (async () => {
      try {
        const res = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.repoName}/readme`, {
          headers: { Authorization: `Bearer ${creds.token}`, Accept: 'application/vnd.github.v3+json' },
        });
        if (!res.ok) {
          setState({ loading: false, content: '', error: res.status === 404 ? 'No README found in this repo.' : `Could not load README (${res.status}).` });
          return;
        }
        const data = await res.json();
        const content = fromBase64(data.content);
        setState({ loading: false, content, error: null });
      } catch (e) {
        setState({ loading: false, content: '', error: 'Could not reach GitHub.' });
      }
    })();
  }, [project.id, repo, creds]);

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.8)', backdropFilter:'blur(6px)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:250, padding:16 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background:'var(--surface)', border:'1px solid var(--border-emphasis)', borderRadius:16, width:'100%', maxWidth:780, maxHeight:'88vh', display:'flex', flexDirection:'column' }}>
        <div style={{ padding:'18px 22px 14px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid var(--border)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
            <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:'var(--text-primary)', letterSpacing:'0.05em' }}>README</span>
            <span style={{ fontSize:11, color:'var(--text-faint)', fontFamily:"'JetBrains Mono',monospace", overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{repo ? `${repo.owner}/${repo.repoName}` : project.name}</span>
          </div>
          <button className="icon-btn" style={{ padding:'4px 6px', background:'transparent', border:'none', color:'var(--text-dim)', borderRadius:5, fontSize:17, cursor:'pointer' }} onClick={onClose}>✕</button>
        </div>

        <div style={{ padding:'18px 22px', overflowY:'auto', flex:1 }}>
          {state.loading && <div className="pulsing" style={{ fontSize:12, color:'var(--text-faint)' }}>Loading README…</div>}
          {state.error && <div style={{ fontSize:13, color:'var(--text-faint)', fontStyle:'italic' }}>{state.error}</div>}
          {!state.loading && !state.error && (
            <div className="md-preview" dangerouslySetInnerHTML={{ __html: renderMarkdown(state.content) }} />
          )}
        </div>
      </div>
    </div>
  );
}

// ── AI Suggestions Panel ──────────────────────────────────────────────────────
function AISuggestions({ project, creds, onAddTasks, onClose }) {
  const [suggestions, setSuggestions] = useState([]);
  const [checked, setChecked] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const fetchSuggestions = useCallback(async () => {
    setLoading(true); setError(null);
    const key = loadAnthropicKey();
    if (!key) { setError('No API key set.'); setLoading(false); return; }
    const doneTasks = (project.tasks||[]).filter(t => t.status === 'done');
    const openTasks = (project.tasks||[]).filter(t => t.status !== 'done');

    // Try to fetch README for richer project context
    let readme = '';
    const repo = parseRepo(project.repo);
    if (repo && creds) {
      try {
        const res = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.repoName}/readme`, {
          headers: { Authorization: `Bearer ${creds.token}`, Accept: 'application/vnd.github.v3+json' },
        });
        if (res.ok) {
          const data = await res.json();
          readme = fromBase64(data.content).slice(0, 4000); // cap to keep prompt focused
        }
      } catch {}
    }

    const readmeBlock = readme ? `\n\nREADME.md content (for deeper project context):\n"""\n${readme}\n"""\n` : '';
    const prompt = `You are helping a developer decide what to work on next in their personal project.\n\nProject: ${project.name}\nDescription: ${project.description || 'None'}\nStatus: ${project.status}\nNotes: ${project.notes || 'None'}${readmeBlock}\n\nAlready-completed tasks (DO NOT suggest any of these again, even if rephrased):\n${doneTasks.map(t => `- ${t.title}`).join('\n') || 'None'}\n\nCurrently open tasks (DO NOT duplicate these, even if rephrased):\n${openTasks.map(t => `- [${t.priority}] ${t.title}`).join('\n') || 'None'}\n\nBased on the project description, notes, README (if present), and what's already done vs open, suggest 4-5 NEW next tasks that logically extend the work. Each should:\n- Be a concrete, single-session task (not vague like "improve code quality")\n- Not overlap semantically with any task in the two lists above\n- Reflect what the project's current state suggests as meaningful next steps\n- Draw on README details where relevant (features mentioned but not built, roadmap items, obvious gaps)\n\nIf you can't identify 4-5 genuinely new, valuable tasks given what's already listed, return fewer — quality over quantity. Return an empty array [] if everything obvious is already covered.\n\nOutput format: a single JSON array of strings only. No markdown code fences, no preamble, no surrounding text. Your entire response must be parseable by JSON.parse().\n\nExample:\n["Add error handling to the auth flow", "Write unit tests for the parser", "Update README with install instructions"]`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 800, messages: [{ role: 'user', content: prompt }] }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        const apiMsg = body.error?.message || body.message || '';
        let msg;
        if (res.status === 401) msg = 'API key not accepted. Check your key in settings.';
        else if (res.status === 400) msg = apiMsg || 'Bad request to Claude API.';
        else if (res.status === 404) msg = `Model not found${apiMsg ? ': ' + apiMsg : ''}`;
        else if (res.status === 429) msg = 'Rate limited. Try again in a moment.';
        else msg = `API error ${res.status}${apiMsg ? ': ' + apiMsg : ''}`;
        setError(msg); setLoading(false); return;
      }
      const data = await res.json();
      const text = data.content[0].text.trim();
      // Tolerant JSON extraction — handle markdown fences, preamble, trailing text
      let jsonStr = text
        .replace(/^```(?:json)?\s*/i, '')
        .replace(/\s*```$/i, '')
        .trim();
      const arrayMatch = jsonStr.match(/\[[\s\S]*\]/);
      if (arrayMatch) jsonStr = arrayMatch[0];
      let parsed;
      try {
        parsed = JSON.parse(jsonStr);
      } catch {
        setError(`Couldn't parse response. Raw text: ${text.slice(0, 120)}${text.length > 120 ? '…' : ''}`);
        setLoading(false); return;
      }
      if (!Array.isArray(parsed) || parsed.length === 0) {
        setError('Claude returned no suggestions. Try regenerating.');
        setLoading(false); return;
      }
      setSuggestions(parsed.filter(s => typeof s === 'string'));
      setChecked(parsed.map(() => true));
    } catch (e) {
      setError('Network error reaching Claude API.');
    }
    setLoading(false);
  }, [project, creds]);

  useEffect(() => { fetchSuggestions(); }, []);

  const checkedCount = checked.filter(Boolean).length;

  return (
    <div style={{ background:'var(--surface-raised)', border:'1px solid var(--border-alt)', borderRadius:10, padding:14, marginBottom:12 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
        <span style={{ fontSize:12, fontWeight:600, color:'#ce93d8' }}>✨ AI Suggestions</span>
        <button onClick={onClose} className="icon-btn" style={{ background:'transparent', border:'none', color:'var(--text-dim)', fontSize:13, cursor:'pointer', padding:'2px 4px' }}>✕</button>
      </div>
      {loading && <div className="pulsing" style={{ fontSize:12, color:'var(--text-faint)', padding:'12px 0' }}>✨ Thinking…</div>}
      {error && <div style={{ fontSize:12, color:'#ef5350', padding:'8px 0' }}>{error}</div>}
      {!loading && !error && suggestions.length > 0 && (
        <>
          <div style={{ display:'flex', flexDirection:'column', gap:4, marginBottom:10 }}>
            {suggestions.map((s, i) => (
              <label key={i} style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 6px', borderRadius:6, cursor:'pointer', fontSize:13, color: checked[i] ? 'var(--text-primary)' : 'var(--text-dimmer)' }}>
                <input type="checkbox" checked={checked[i]} onChange={() => setChecked(c => c.map((v, j) => j === i ? !v : v))}
                  style={{ accentColor:'#00e676' }}/>
                {s}
              </label>
            ))}
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={() => { onAddTasks(suggestions.filter((_, i) => checked[i])); onClose(); }}
              disabled={checkedCount === 0}
              style={{ padding:'7px 14px', background: checkedCount ? '#00e676' : 'var(--border-alt)', border:'none', borderRadius:8, color: checkedCount ? '#000' : 'var(--text-dimmer)', fontSize:12, fontWeight:600, cursor: checkedCount ? 'pointer' : 'default' }}>
              Add {checkedCount} selected
            </button>
            <button onClick={fetchSuggestions}
              style={{ padding:'7px 14px', background:'transparent', border:'1px solid var(--border-alt)', borderRadius:8, color:'var(--text-faint)', fontSize:12, cursor:'pointer' }}>
              Regenerate
            </button>
          </div>
        </>
      )}
    </div>
  );
}

// ── Mount ──────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
