// ── Task List ──────────────────────────────────────────────────────────────────
function TaskList({ project, projectId, tasks, onAdd, onUpdate, onDelete, onReorder, openTaskId, creds }) {
  const [newTitle, setNewTitle] = useState('');
  const [expandedId, setExpandedId] = useState(null);
  const [showAI, setShowAI] = useState(false);
  const [viewMode, setViewMode] = useState(() => {
    try { return localStorage.getItem(`devlab-board-${projectId}`) || 'list'; } catch { return 'list'; }
  });

  const switchView = (m) => { setViewMode(m); try { localStorage.setItem(`devlab-board-${projectId}`, m); } catch {} };

  // Open a specific task from search / focus view
  useEffect(() => { if (openTaskId) setExpandedId(openTaskId); }, [openTaskId]);
  const inputRef = useRef(null);
  const listRef = useRef(null);
  const dragRef = useRef({ dragIdx: -1, overIdx: -1 });
  const touchRef = useRef({ idx: -1, startY: 0, curY: 0, el: null, listEl: null, rects: [], moved: false });

  // Sort: active tasks by order, done tasks at bottom by order
  const sortedTasks = useMemo(() => {
    const active = tasks.filter(t => t.status !== 'done').sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const done = tasks.filter(t => t.status === 'done').sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    return [...active, ...done];
  }, [tasks]);

  const doneCount = tasks.filter(t => t.status === 'done').length;

  const handleAdd = () => {
    if (!newTitle.trim()) return;
    const newId = onAdd(projectId, newTitle.trim());
    setNewTitle('');
    setExpandedId(newId);
    inputRef.current?.focus();
  };

  // ── Desktop DnD ──
  const handleDragStart = (e, idx) => {
    dragRef.current.dragIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.style.opacity = '0.4';
  };
  const handleDragOver = (e, idx) => {
    e.preventDefault();
    dragRef.current.overIdx = idx;
  };
  const handleDrop = (e, idx) => {
    e.preventDefault();
    const { dragIdx } = dragRef.current;
    if (dragIdx < 0 || dragIdx === idx) return;
    const arr = [...sortedTasks];
    const [moved] = arr.splice(dragIdx, 1);
    arr.splice(idx, 0, moved);
    arr.forEach((t, i) => t.order = i);
    onReorder(projectId, arr);
  };
  const handleDragEnd = (e) => {
    e.currentTarget.style.opacity = '1';
    dragRef.current = { dragIdx: -1, overIdx: -1 };
  };

  // ── Mobile touch DnD ──
  const handleTouchStart = (e, idx) => {
    const touch = e.touches[0];
    const row = e.currentTarget.closest('.task-row');
    const list = listRef.current;
    const rows = list ? Array.from(list.querySelectorAll('.task-row')) : [];
    const rects = rows.map(r => r.getBoundingClientRect());
    touchRef.current = { idx, startY: touch.clientY, curY: touch.clientY, el: row, listEl: list, rects, moved: false };
    row.style.opacity = '0.5';
    row.style.position = 'relative';
    row.style.zIndex = '50';
  };
  const handleTouchMove = (e, idx) => {
    e.preventDefault();
    const t = touchRef.current;
    if (t.idx < 0) return;
    t.moved = true;
    const touch = e.touches[0];
    const dy = touch.clientY - t.startY;
    t.curY = touch.clientY;
    t.el.style.transform = `translateY(${dy}px)`;
  };
  const handleTouchEnd = (e) => {
    const t = touchRef.current;
    if (t.idx < 0 || !t.moved) {
      if (t.el) { t.el.style.opacity = ''; t.el.style.position = ''; t.el.style.zIndex = ''; t.el.style.transform = ''; }
      touchRef.current = { idx: -1, startY: 0, curY: 0, el: null, listEl: null, rects: [], moved: false };
      return;
    }
    // Determine drop index from final touch Y
    let dropIdx = t.idx;
    for (let i = 0; i < t.rects.length; i++) {
      const r = t.rects[i];
      if (t.curY >= r.top && t.curY < r.bottom) { dropIdx = i; break; }
    }
    t.el.style.opacity = '';
    t.el.style.position = '';
    t.el.style.zIndex = '';
    t.el.style.transform = '';
    if (dropIdx !== t.idx) {
      const arr = [...sortedTasks];
      const [moved] = arr.splice(t.idx, 1);
      arr.splice(dropIdx, 0, moved);
      arr.forEach((task, i) => task.order = i);
      onReorder(projectId, arr);
    }
    touchRef.current = { idx: -1, startY: 0, curY: 0, el: null, listEl: null, rects: [], moved: false };
  };

  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase' }}>Tasks</span>
          <span style={{ fontSize:11, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>{doneCount} / {tasks.length}</span>
        </div>
        <div style={{ display:'flex', gap:2 }}>
          <button onClick={() => switchView('list')} style={{ padding:'3px 8px', borderRadius:5, border:`1px solid ${viewMode==='list'?'#29b6f6':'var(--border-alt)'}`, background: viewMode==='list'?'rgba(41,182,246,0.10)':'transparent', color: viewMode==='list'?'#29b6f6':'var(--text-dimmer)', fontSize:10, cursor:'pointer' }}>≡ List</button>
          <button onClick={() => switchView('board')} style={{ padding:'3px 8px', borderRadius:5, border:`1px solid ${viewMode==='board'?'#29b6f6':'var(--border-alt)'}`, background: viewMode==='board'?'rgba(41,182,246,0.10)':'transparent', color: viewMode==='board'?'#29b6f6':'var(--text-dimmer)', fontSize:10, cursor:'pointer' }}>⊞ Board</button>
        </div>
      </div>

      {/* Quick-add */}
      <div style={{ display:'flex', gap:8, marginBottom:10 }}>
        <input ref={inputRef} value={newTitle} onChange={e => setNewTitle(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') handleAdd(); if (e.key === 'Escape') { setNewTitle(''); inputRef.current?.blur(); } }}
          placeholder="Add a task… press Enter to save"
          style={{ flex:1, background:'var(--surface-raised)', border:'1px solid var(--border-alt)', borderRadius:8, padding:'9px 12px', color:'var(--text-primary)', fontSize:13, outline:'none' }}/>
        {loadAnthropicKey() && !showAI && (
          <button onClick={() => setShowAI(true)}
            style={{ padding:'6px 12px', background:'rgba(206,147,216,0.08)', border:'1px solid rgba(206,147,216,0.18)', borderRadius:8, color:'#ce93d8', fontSize:11, cursor:'pointer', flexShrink:0, whiteSpace:'nowrap' }}>
            ✨ Suggest
          </button>
        )}
      </div>

      {showAI && project && (
        <AISuggestions project={project} creds={creds} onClose={() => setShowAI(false)}
          onAddTasks={(titles) => titles.forEach(t => onAdd(projectId, t))} />
      )}

      {/* Task rows — List view */}
      {viewMode === 'list' && (
        <div ref={listRef} style={{ display:'flex', flexDirection:'column', gap:2 }}>
          {sortedTasks.map((task, idx) => (
            <TaskRow key={task.id} task={task} idx={idx}
              expanded={expandedId === task.id}
              onToggleExpand={() => setExpandedId(expandedId === task.id ? null : task.id)}
              projectId={projectId}
              onUpdate={onUpdate}
              onDelete={onDelete}
              onDragStart={handleDragStart}
              onDragOver={handleDragOver}
              onDrop={handleDrop}
              onDragEnd={handleDragEnd}
              onTouchStart={handleTouchStart}
              onTouchMove={handleTouchMove}
              onTouchEnd={handleTouchEnd}
              milestones={project ? project.milestones : []}
            />
          ))}
          {tasks.length === 0 && (
            <div style={{ color:'var(--text-faint)', fontSize:13, textAlign:'center', padding:'24px 0' }}>No tasks yet. Add one above.</div>
          )}
        </div>
      )}

      {/* Kanban board view */}
      {viewMode === 'board' && (
        <KanbanBoard tasks={tasks} projectId={projectId} onUpdate={onUpdate}
          expandedId={expandedId} setExpandedId={setExpandedId} onDelete={onDelete} />
      )}
    </div>
  );
}

// ── Task Row ───────────────────────────────────────────────────────────────────
function TaskRow({ task, idx, expanded, onToggleExpand, projectId, onUpdate, onDelete, onDragStart, onDragOver, onDrop, onDragEnd, onTouchStart, onTouchMove, onTouchEnd, projectLabel, hideDrag, onOpenProject, milestones }) {
  const isDone = task.status === 'done';
  const ts = TASK_STATUS[task.status] || TASK_STATUS.todo;
  const pr = PRIORITY[task.priority] || PRIORITY.medium;

  const [desc, setDesc] = useState(task.description || '');
  const [dueDate, setDueDate] = useState(task.dueDate || '');

  // Sync from props when task changes externally
  useEffect(() => { setDesc(task.description || ''); }, [task.description]);
  useEffect(() => { setDueDate(task.dueDate || ''); }, [task.dueDate]);

  const toggleDone = (e) => {
    e.stopPropagation();
    if (isDone) {
      onUpdate(projectId, task.id, { status: 'todo', completedAt: null });
    } else {
      const incomplete = (task.subtasks || []).filter(s => s.status !== 'done').length;
      if (incomplete > 0 && !window.confirm(`${incomplete} subtask${incomplete>1?'s':''} not done. Mark parent done anyway?`)) return;
      onUpdate(projectId, task.id, { status: 'done', completedAt: now() });
    }
  };

  const cycleStatus = (e) => {
    e.stopPropagation();
    const i = TASK_STATUS_CYCLE.indexOf(task.status);
    const next = TASK_STATUS_CYCLE[(i + 1) % TASK_STATUS_CYCLE.length];
    const updates = { status: next };
    if (next === 'done') updates.completedAt = now();
    else updates.completedAt = null;
    onUpdate(projectId, task.id, updates);
  };

  const cyclePriority = (e) => {
    e.stopPropagation();
    const i = PRIORITY_CYCLE.indexOf(task.priority || 'medium');
    const next = PRIORITY_CYCLE[(i + 1) % PRIORITY_CYCLE.length];
    onUpdate(projectId, task.id, { priority: next });
  };

  const saveDesc = () => {
    if (desc !== (task.description || '')) onUpdate(projectId, task.id, { description: desc });
  };
  const saveDueDate = (val) => {
    setDueDate(val);
    onUpdate(projectId, task.id, { dueDate: val || null });
  };

  const formatDue = (d) => {
    if (!d) return '';
    const date = new Date(d + 'T00:00:00');
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };

  return (
    <div>
      <div className="task-row"
        draggable={!hideDrag}
        onDragStart={!hideDrag ? (e) => {
          if (!e.target.closest('.drag-handle')) { e.preventDefault(); return; }
          onDragStart(e, idx);
        } : undefined}
        onDragOver={!hideDrag ? (e) => onDragOver(e, idx) : undefined}
        onDrop={!hideDrag ? (e) => onDrop(e, idx) : undefined}
        onDragEnd={!hideDrag ? onDragEnd : undefined}
        style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:8, opacity: isDone ? 0.45 : 1 }}>

        {/* Drag handle */}
        {!hideDrag && (
          <span className="drag-handle"
            onTouchStart={(e) => onTouchStart(e, idx)}
            onTouchMove={(e) => onTouchMove(e, idx)}
            onTouchEnd={onTouchEnd}
            style={{ fontSize:14, color:'var(--text-dimmer)', lineHeight:1, padding:'2px 2px' }}>≡</span>
        )}

        {/* Checkbox */}
        <button onClick={toggleDone}
          style={{ width:18, height:18, borderRadius:4, border:`1.5px solid ${isDone ? '#00e676' : '#2a2a40'}`, background: isDone ? 'rgba(0,230,118,0.15)' : 'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, padding:0 }}>
          {isDone && <span style={{ color:'#00e676', fontSize:11, lineHeight:1 }}>✓</span>}
        </button>

        {/* Priority selector */}
        <select value={task.priority || 'none'} onClick={e => e.stopPropagation()}
          onChange={e => { e.stopPropagation(); onUpdate(projectId, task.id, { priority: e.target.value }); }}
          style={{ fontSize:9, fontWeight:600, padding:'2px 4px', borderRadius:99, letterSpacing:'0.04em', textTransform:'uppercase', color:pr.color, background:pr.bg, border: (task.priority && task.priority !== 'none') ? 'none' : '1px solid var(--border-alt)', cursor:'pointer', flexShrink:0, lineHeight:1.3, outline:'none', appearance:'none', WebkitAppearance:'none', paddingRight:12, backgroundImage:`url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%234a4a6a' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E")`, backgroundRepeat:'no-repeat', backgroundPosition:'right 3px center' }}>
          {PRIORITY_CYCLE.map(p => <option key={p} value={p} style={{ background:'var(--surface)', color: PRIORITY[p]?.color || 'var(--text-dimmer)' }}>{PRIORITY[p]?.label || 'None'}</option>)}
        </select>

        {/* Title + Project label grouped together */}
        <div onClick={onToggleExpand} style={{ flex:1, display:'flex', alignItems:'center', gap:6, minWidth:0, cursor:'pointer' }}>
          <span style={{ fontSize:13, color: isDone ? 'var(--text-dimmer)' : 'var(--text-primary)', textDecoration: isDone ? 'line-through' : 'none', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {task.title}
          </span>
          {projectLabel && (
            <button onClick={(e) => { e.stopPropagation(); onOpenProject && onOpenProject(); }}
              style={{ fontSize:9, fontWeight:500, padding:'2px 8px', borderRadius:5, background:'var(--border)', color:'var(--text-faint)', border:'none', cursor:'pointer', flexShrink:0, lineHeight:1.3, maxWidth:120, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
              {projectLabel}
            </button>
          )}
        </div>

        {/* Label chips */}
        {(task.labels || []).length > 0 && (
          <div style={{ display:'flex', gap:3, flexShrink:0 }}>
            {(task.labels || []).slice(0, 3).map(l => {
              const lc = LABEL_COLORS[l] || DEFAULT_LABEL_COLOR;
              return <span key={l} style={{ fontSize:9, fontWeight:600, padding:'1px 6px', borderRadius:99, color:lc.color, background:lc.bg, letterSpacing:'0.04em', maxWidth:70, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{l}</span>;
            })}
            {(task.labels || []).length > 3 && <span style={{ fontSize:9, color:'var(--text-faint)' }}>+{task.labels.length - 3}</span>}
          </div>
        )}

        {/* Sub-task count */}
        {(task.subtasks || []).length > 0 && (
          <span style={{ fontSize:9, color:'var(--text-faint)', fontFamily:"'JetBrains Mono',monospace", flexShrink:0 }}>
            {(task.subtasks||[]).filter(s=>s.status==='done').length}/{(task.subtasks||[]).length} ◦
          </span>
        )}

        {/* Status badge */}
        <button onClick={cycleStatus}
          style={{ fontSize:9, fontWeight:600, padding:'2px 7px', borderRadius:99, letterSpacing:'0.04em', textTransform:'uppercase', color:ts.color, background:ts.bg, border:'none', cursor:'pointer', flexShrink:0, lineHeight:1.3 }}>
          {ts.label}
        </button>

        {/* Due date (compact) */}
        {task.dueDate && (
          <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace", flexShrink:0 }}>
            {formatDue(task.dueDate)}
          </span>
        )}

        {/* Delete */}
        <button className="icon-btn" onClick={(e) => { e.stopPropagation(); onDelete(projectId, task.id); }}
          style={{ background:'transparent', border:'none', color:'#ef5350', fontSize:13, padding:'2px 4px', borderRadius:4, cursor:'pointer', flexShrink:0 }}>✕</button>
      </div>

      {/* Expanded panel */}
      {expanded && (
        <div style={{ marginLeft:36, padding:'10px 14px', background:'var(--surface-raised)', borderRadius:8, border:'1px solid var(--border-alt)', marginTop:2, marginBottom:4, display:'flex', flexDirection:'column', gap:10 }}>
          <div>
            <label style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>Description</label>
            <textarea value={desc} onChange={e => setDesc(e.target.value)} onBlur={saveDesc}
              placeholder="Add details…"
              style={{ width:'100%', background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:6, padding:'8px 10px', color:'var(--text-primary)', fontSize:13, outline:'none', lineHeight:1.5, fontFamily:"'DM Sans',sans-serif" }}
              rows={3}/>
          </div>
          <div style={{ display:'flex', gap:14, flexWrap:'wrap', alignItems:'center' }}>
            <div>
              <label style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>Due Date</label>
              <input type="date" value={dueDate} onChange={e => saveDueDate(e.target.value)}
                style={{ background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:6, padding:'6px 10px', color:'var(--text-primary)', fontSize:12, outline:'none', fontFamily:"'JetBrains Mono',monospace" }}/>
            </div>
            <div>
              <label style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>Status</label>
              <select value={task.status} onChange={e => {
                const updates = { status: e.target.value };
                if (e.target.value === 'done') updates.completedAt = now();
                else updates.completedAt = null;
                onUpdate(projectId, task.id, updates);
              }}
                style={{ background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:6, padding:'6px 10px', color:'var(--text-primary)', fontSize:12, outline:'none' }}>
                {Object.entries(TASK_STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            {(milestones || []).length > 0 && (
              <div>
                <label style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>Milestone</label>
                <select value={task.milestoneId || ''} onChange={e => onUpdate(projectId, task.id, { milestoneId: e.target.value || null })}
                  style={{ background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:6, padding:'6px 10px', color:'var(--text-primary)', fontSize:12, outline:'none' }}>
                  <option value="">None</option>
                  {(milestones || []).map(m => <option key={m.id} value={m.id}>{m.title}</option>)}
                </select>
              </div>
            )}
            <div>
              <label style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:4 }}>GitHub Link</label>
              <input value={task.githubLink || ''} onChange={e => onUpdate(projectId, task.id, { githubLink: e.target.value || null })}
                placeholder="#123 or SHA or URL"
                style={{ background:'var(--surface)', border:'1px solid var(--border-alt)', borderRadius:6, padding:'6px 10px', color:'var(--text-primary)', fontSize:12, outline:'none', fontFamily:"'JetBrains Mono',monospace", width:180 }}/>
            </div>
          </div>
          {/* Labels */}
          <div>
            <label style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:6 }}>Labels</label>
            <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:6 }}>
              {Object.keys(LABEL_COLORS).map(l => {
                const on = (task.labels || []).includes(l);
                const lc = LABEL_COLORS[l];
                return (
                  <button key={l} onClick={() => {
                    const labels = (task.labels || []);
                    onUpdate(projectId, task.id, { labels: on ? labels.filter(x => x !== l) : [...labels, l] });
                  }}
                    style={{ fontSize:10, fontWeight:600, padding:'3px 8px', borderRadius:99, border:`1px solid ${on ? lc.color : 'var(--border-alt)'}`, background: on ? lc.bg : 'transparent', color: on ? lc.color : 'var(--text-dimmer)', cursor:'pointer', letterSpacing:'0.04em' }}>
                    {l}
                  </button>
                );
              })}
            </div>
            <div style={{ display:'flex', gap:4, alignItems:'center', flexWrap:'wrap' }}>
              {(task.labels || []).filter(l => !LABEL_COLORS[l]).map(l => (
                <span key={l} style={{ fontSize:10, fontWeight:600, padding:'2px 7px', borderRadius:99, color:'var(--text-dimmer)', background:'rgba(74,74,106,0.10)', display:'flex', alignItems:'center', gap:3 }}>
                  {l} <span onClick={() => onUpdate(projectId, task.id, { labels: (task.labels || []).filter(x => x !== l) })} style={{ cursor:'pointer', color:'#ef5350', fontSize:8 }}>✕</span>
                </span>
              ))}
              <input placeholder="+ custom" onKeyDown={e => {
                if (e.key === 'Enter' && e.target.value.trim()) {
                  const val = e.target.value.trim().toLowerCase();
                  if (!(task.labels || []).includes(val)) onUpdate(projectId, task.id, { labels: [...(task.labels || []), val] });
                  e.target.value = '';
                }
              }}
                style={{ background:'transparent', border:'1px solid var(--border-alt)', borderRadius:6, padding:'3px 8px', color:'var(--text-primary)', fontSize:10, outline:'none', width:80 }}/>
            </div>
          </div>
          {/* Sub-tasks */}
          <SubtaskPanel task={task} projectId={projectId} onUpdate={onUpdate} />
        </div>
      )}
    </div>
  );
}

// ── Milestones Panel ──────────────────────────────────────────────────────────
function MilestonesPanel({ project, onUpdateProject }) {
  const [adding, setAdding] = useState(false);
  const [title, setTitle] = useState('');
  const [dueDate, setDueDate] = useState('');
  const milestones = project.milestones || [];

  const addMilestone = () => {
    if (!title.trim()) return;
    const ms = { id: uid(), title: title.trim(), dueDate: dueDate || null, taskIds: [] };
    onUpdateProject(project.id, { milestones: [...milestones, ms] });
    setTitle(''); setDueDate(''); setAdding(false);
  };

  const deleteMilestone = (msId) => {
    onUpdateProject(project.id, { milestones: milestones.filter(m => m.id !== msId) });
  };

  if (milestones.length === 0 && !adding) {
    return (
      <div style={{ marginBottom:16 }}>
        <button onClick={() => setAdding(true)}
          style={{ fontSize:11, color:'var(--text-dimmer)', background:'transparent', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', cursor:'pointer' }}>
          + Add milestone
        </button>
      </div>
    );
  }

  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:14, marginBottom:16 }}>
      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase', marginBottom:10 }}>Milestones</div>
      {milestones.map(ms => {
        const tasks = (project.tasks || []).filter(t => t.milestoneId === ms.id);
        const done = tasks.filter(t => t.status === 'done').length;
        const pct = tasks.length > 0 ? Math.round((done / tasks.length) * 100) : 0;
        return (
          <div key={ms.id} style={{ marginBottom:10 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
              <span style={{ fontSize:13, color:'var(--text-primary)', fontWeight:500, flex:1 }}>{ms.title}</span>
              {ms.dueDate && <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>{new Date(ms.dueDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>}
              <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>{done}/{tasks.length}</span>
              <button onClick={() => deleteMilestone(ms.id)} className="icon-btn" style={{ background:'transparent', border:'none', color:'#ef5350', fontSize:11, cursor:'pointer', padding:'0 2px' }}>✕</button>
            </div>
            <div style={{ height:4, background:'var(--border)', borderRadius:4, overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${pct}%`, background: pct === 100 ? '#00e676' : '#ffa726', transition:'width 0.3s ease' }} />
            </div>
          </div>
        );
      })}
      {adding ? (
        <div style={{ display:'flex', gap:6, alignItems:'center', marginTop:6 }}>
          <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Milestone title"
            onKeyDown={e => e.key === 'Enter' && addMilestone()}
            style={{ flex:1, background:'var(--surface-raised)', border:'1px solid var(--border-alt)', borderRadius:6, padding:'6px 10px', color:'var(--text-primary)', fontSize:12, outline:'none' }}/>
          <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
            style={{ background:'var(--surface-raised)', border:'1px solid var(--border-alt)', borderRadius:6, padding:'6px 8px', color:'var(--text-primary)', fontSize:11, outline:'none', fontFamily:"'JetBrains Mono',monospace" }}/>
          <button onClick={addMilestone} style={{ padding:'6px 10px', background:'#00e676', border:'none', borderRadius:6, color:'#000', fontSize:11, fontWeight:600, cursor:'pointer' }}>Add</button>
          <button onClick={() => setAdding(false)} style={{ padding:'6px 8px', background:'transparent', border:'none', color:'var(--text-dimmer)', fontSize:11, cursor:'pointer' }}>✕</button>
        </div>
      ) : (
        <button onClick={() => setAdding(true)}
          style={{ fontSize:11, color:'var(--text-dimmer)', background:'transparent', border:'none', cursor:'pointer', marginTop:4 }}>
          + Add milestone
        </button>
      )}
    </div>
  );
}

// ── Kanban Board ──────────────────────────────────────────────────────────────
function KanbanBoard({ tasks, projectId, onUpdate, expandedId, setExpandedId, onDelete }) {
  const columns = ['todo', 'in_progress', 'blocked', 'done'];
  const dragRef = useRef({ taskId: null, fromCol: null });

  const handleDragStart = (e, taskId, col) => {
    dragRef.current = { taskId, fromCol: col };
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.style.opacity = '0.4';
  };
  const handleDragEnd = (e) => { e.currentTarget.style.opacity = '1'; };
  const handleDragOver = (e) => { e.preventDefault(); };
  const handleDrop = (e, targetCol) => {
    e.preventDefault();
    const { taskId } = dragRef.current;
    if (!taskId) return;
    const updates = { status: targetCol };
    if (targetCol === 'done') updates.completedAt = now();
    else updates.completedAt = null;
    onUpdate(projectId, taskId, updates);
    dragRef.current = { taskId: null, fromCol: null };
  };

  return (
    <div style={{ display:'flex', gap:10, overflowX:'auto', paddingBottom:8 }}>
      {columns.map(col => {
        const cfg = TASK_STATUS[col];
        const colTasks = tasks.filter(t => t.status === col).sort((a,b) => (a.order??0)-(b.order??0));
        return (
          <div key={col}
            onDragOver={handleDragOver}
            onDrop={(e) => handleDrop(e, col)}
            style={{ minWidth:180, flex:1, background:'var(--surface-raised)', borderRadius:10, padding:10, border:'1px solid var(--border)', flexShrink:0 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
              <span style={{ fontSize:10, fontWeight:700, color:cfg.color, letterSpacing:'0.06em', textTransform:'uppercase' }}>{cfg.label}</span>
              <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>{colTasks.length}</span>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {colTasks.map(task => {
                const pr = PRIORITY[task.priority] || PRIORITY.medium;
                return (
                  <div key={task.id} draggable
                    onDragStart={(e) => handleDragStart(e, task.id, col)}
                    onDragEnd={handleDragEnd}
                    onClick={() => setExpandedId(expandedId === task.id ? null : task.id)}
                    style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 10px', cursor:'pointer', transition:'border-color .15s' }}
                    onMouseOver={e => e.currentTarget.style.borderColor='var(--border-emphasis)'}
                    onMouseOut={e => e.currentTarget.style.borderColor='var(--border)'}>
                    {task.priority && task.priority !== 'none' && (
                      <span style={{ fontSize:9, fontWeight:600, padding:'1px 6px', borderRadius:99, color:pr.color, background:pr.bg, textTransform:'uppercase', display:'inline-block', marginBottom:4 }}>{pr.label}</span>
                    )}
                    <div style={{ fontSize:12, color:'var(--text-primary)', lineHeight:1.4, marginBottom:4 }}>{task.title}</div>
                    <div style={{ display:'flex', gap:3, flexWrap:'wrap', alignItems:'center' }}>
                      {(task.labels||[]).slice(0,2).map(l => {
                        const lc = LABEL_COLORS[l] || DEFAULT_LABEL_COLOR;
                        return <span key={l} style={{ fontSize:8, padding:'1px 5px', borderRadius:99, color:lc.color, background:lc.bg }}>{l}</span>;
                      })}
                      {task.dueDate && <span style={{ fontSize:9, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>{new Date(task.dueDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>}
                      {(task.subtasks||[]).length > 0 && <span style={{ fontSize:9, color:'var(--text-faint)', fontFamily:"'JetBrains Mono',monospace" }}>{(task.subtasks||[]).filter(s=>s.status==='done').length}/{(task.subtasks||[]).length} ◦</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Subtask Panel ─────────────────────────────────────────────────────────────
function SubtaskPanel({ task, projectId, onUpdate }) {
  const [newSub, setNewSub] = useState('');
  const subtasks = (task.subtasks || []);
  const sorted = [...subtasks].sort((a, b) => {
    if (a.status === 'done' && b.status !== 'done') return 1;
    if (a.status !== 'done' && b.status === 'done') return -1;
    return (a.order ?? 0) - (b.order ?? 0);
  });
  const doneCount = subtasks.filter(s => s.status === 'done').length;

  const addSub = () => {
    if (!newSub.trim()) return;
    const sub = { id: uid(), title: newSub.trim(), status: 'todo', order: subtasks.length, createdAt: now() };
    onUpdate(projectId, task.id, { subtasks: [...subtasks, sub] });
    setNewSub('');
  };
  const toggleSub = (sid) => {
    onUpdate(projectId, task.id, { subtasks: subtasks.map(s => s.id === sid ? { ...s, status: s.status === 'done' ? 'todo' : 'done' } : s) });
  };
  const deleteSub = (sid) => {
    onUpdate(projectId, task.id, { subtasks: subtasks.filter(s => s.id !== sid) });
  };

  return (
    <div>
      <label style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', display:'block', marginBottom:6 }}>
        Subtasks {subtasks.length > 0 && `(${doneCount} / ${subtasks.length} done)`}
      </label>
      <div style={{ display:'flex', flexDirection:'column', gap:2, marginBottom:6 }}>
        {sorted.map(s => (
          <div key={s.id} style={{ display:'flex', alignItems:'center', gap:6, padding:'4px 6px', borderRadius:5, opacity: s.status === 'done' ? 0.45 : 1 }}>
            <button onClick={() => toggleSub(s.id)}
              style={{ width:15, height:15, borderRadius:3, border:`1.5px solid ${s.status==='done'?'#00e676':'#2a2a40'}`, background: s.status==='done'?'rgba(0,230,118,0.15)':'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, padding:0 }}>
              {s.status === 'done' && <span style={{ color:'#00e676', fontSize:9, lineHeight:1 }}>✓</span>}
            </button>
            <span style={{ flex:1, fontSize:12, color: s.status==='done'?'var(--text-dimmer)':'var(--text-primary)', textDecoration: s.status==='done'?'line-through':'none' }}>{s.title}</span>
            <button onClick={() => deleteSub(s.id)} style={{ background:'transparent', border:'none', color:'#ef5350', fontSize:11, cursor:'pointer', padding:'0 2px', opacity:.5 }}>✕</button>
          </div>
        ))}
      </div>
      <input value={newSub} onChange={e => setNewSub(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter') addSub(); }}
        placeholder="+ Add a subtask…"
        style={{ width:'100%', background:'transparent', border:'1px solid var(--border-alt)', borderRadius:6, padding:'5px 8px', color:'var(--text-primary)', fontSize:11, outline:'none' }}/>
    </div>
  );
}

// ── Search Overlay ────────────────────────────────────────────────────────────
function SearchOverlay({ projects, ideas, onClose, onOpenProject, onOpenIdeas }) {
  const [query, setQuery] = useState('');
  const [hlIdx, setHlIdx] = useState(0);
  const inputRef = useRef(null);
  const debounceRef = useRef(null);
  const [debouncedQ, setDebouncedQ] = useState('');

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => setDebouncedQ(query), 150);
    return () => clearTimeout(debounceRef.current);
  }, [query]);
  useEffect(() => { setHlIdx(0); }, [debouncedQ]);

  const results = useMemo(() => {
    const q = debouncedQ.toLowerCase().trim();
    if (q.length < 2) {
      // Show recent projects
      return { projects: [...projects].sort((a, b) => new Date(b.lastUpdated || 0) - new Date(a.lastUpdated || 0)).slice(0, 5).map(p => ({ ...p, _type: 'project' })), tasks: [], ideas: [] };
    }
    const matchProjects = projects.filter(p =>
      (p.name || '').toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q) || (p.notes || '').toLowerCase().includes(q)
    ).slice(0, 5).map(p => ({ ...p, _type: 'project' }));

    const matchTasks = projects.flatMap(p =>
      (p.tasks || []).filter(t => (t.title || '').toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q))
        .map(t => ({ ...t, projectId: p.id, projectName: p.name, _type: 'task' }))
    ).slice(0, 5);

    const matchIdeas = ideas.filter(i => (i.text || '').toLowerCase().includes(q))
      .slice(0, 5).map(i => ({ ...i, _type: 'idea' }));

    return { projects: matchProjects, tasks: matchTasks, ideas: matchIdeas };
  }, [debouncedQ, projects, ideas]);

  const flat = [...results.projects, ...results.tasks, ...results.ideas];

  const handleKey = (e) => {
    if (e.key === 'Escape') { onClose(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setHlIdx(i => Math.min(i + 1, flat.length - 1)); }
    if (e.key === 'ArrowUp') { e.preventDefault(); setHlIdx(i => Math.max(i - 1, 0)); }
    if (e.key === 'Enter' && flat[hlIdx]) { select(flat[hlIdx]); }
  };

  const select = (item) => {
    if (item._type === 'project') { onOpenProject(item.id); onClose(); }
    else if (item._type === 'task') { onOpenProject(item.projectId, item.id); onClose(); }
    else if (item._type === 'idea') { onOpenIdeas(); onClose(); }
  };

  const highlight = (text, q) => {
    if (!q || q.length < 2) return text;
    const idx = (text || '').toLowerCase().indexOf(q.toLowerCase());
    if (idx < 0) return text;
    return <>{text.slice(0, idx)}<span style={{ color:'#00e676' }}>{text.slice(idx, idx + q.length)}</span>{text.slice(idx + q.length)}</>;
  };

  let globalIdx = -1;
  const ResultRow = ({ item, children }) => {
    globalIdx++;
    const myIdx = globalIdx;
    const active = myIdx === hlIdx;
    return (
      <div onClick={() => select(item)}
        onMouseEnter={() => setHlIdx(myIdx)}
        style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 12px', borderRadius:8, cursor:'pointer', background: active ? 'var(--border-alt)' : 'transparent', borderLeft: active ? '2px solid #00e676' : '2px solid transparent', transition:'background .1s' }}>
        {children}
      </div>
    );
  };

  const SectionLabel = ({ label }) => (
    <div style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', padding:'10px 12px 4px' }}>{label}</div>
  );

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', backdropFilter:'blur(6px)', display:'flex', alignItems:'flex-start', justifyContent:'center', zIndex:300, padding:'80px 16px 16px' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="fade-in" style={{ width:'100%', maxWidth:560, background:'var(--surface)', border:'1px solid var(--border-emphasis)', borderRadius:16, overflow:'hidden' }}>
        <div style={{ padding:'16px 18px', borderBottom:'1px solid var(--border)' }}>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)} onKeyDown={handleKey}
            placeholder="Search projects, tasks, ideas…"
            style={{ width:'100%', background:'transparent', border:'none', color:'var(--text-primary)', fontSize:15, outline:'none' }}/>
        </div>
        <div style={{ maxHeight:400, overflowY:'auto', padding:'4px 6px 10px' }}>
          {results.projects.length > 0 && <>
            <SectionLabel label={debouncedQ.length < 2 ? 'Recent Projects' : `Projects (${results.projects.length})`} />
            {results.projects.map(p => (
              <ResultRow key={p.id} item={p}>
                <span style={{ color:'#29b6f6', fontSize:12, flexShrink:0 }}>◈</span>
                <span style={{ flex:1, fontSize:13, color:'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{highlight(p.name, debouncedQ)}</span>
              </ResultRow>
            ))}
          </>}
          {results.tasks.length > 0 && <>
            <SectionLabel label={`Tasks (${results.tasks.length})`} />
            {results.tasks.map(t => (
              <ResultRow key={t.id} item={t}>
                <span style={{ fontSize:11, flexShrink:0 }}>{t.status === 'done' ? '✓' : '□'}</span>
                <span style={{ flex:1, fontSize:13, color:'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{highlight(t.title, debouncedQ)}</span>
                <span style={{ fontSize:10, color:'var(--text-dimmer)', flexShrink:0 }}>{t.projectName} →</span>
              </ResultRow>
            ))}
          </>}
          {results.ideas.length > 0 && <>
            <SectionLabel label={`Ideas (${results.ideas.length})`} />
            {results.ideas.map(i => (
              <ResultRow key={i.id} item={i}>
                <span style={{ fontSize:11, flexShrink:0 }}>💡</span>
                <span style={{ flex:1, fontSize:13, color:'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{highlight(i.text, debouncedQ)}</span>
              </ResultRow>
            ))}
          </>}
          {flat.length === 0 && debouncedQ.length >= 2 && (
            <div style={{ textAlign:'center', padding:'24px 0', color:'var(--text-dimmer)', fontSize:13 }}>No results found.</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Digest View ───────────────────────────────────────────────────────────────
function DigestView({ projects, ideas }) {
  const [copied, setCopied] = useState(false);
  const [narrative, setNarrative] = useState('');
  const [narLoading, setNarLoading] = useState(false);
  const [narError, setNarError] = useState('');

  const sevenDaysAgo = useMemo(() => new Date(Date.now() - 7 * 86400000).toISOString(), []);
  const today = new Date();
  const weekStart = new Date(Date.now() - 7 * 86400000);

  const digest = useMemo(() => {
    const completed = [];
    const added = [];
    const critHigh = [];
    const stalledProjs = [];
    const cutoff = Date.now() - 14 * 86400000;

    projects.forEach(p => {
      const pCompleted = [];
      const pAdded = [];
      (p.tasks || []).forEach(t => {
        if (t.completedAt && t.completedAt >= sevenDaysAgo) pCompleted.push(t);
        if (t.createdAt && t.createdAt >= sevenDaysAgo && t.status !== 'done') pAdded.push(t);
        if (t.status !== 'done' && (t.priority === 'critical' || t.priority === 'high')) critHigh.push({ ...t, projectName: p.name });
      });
      if (pCompleted.length > 0) completed.push({ name: p.name, tasks: pCompleted });
      pAdded.forEach(t => added.push({ ...t, projectName: p.name }));
      if (p.status === 'active' && new Date(p.lastUpdated || 0) < cutoff) stalledProjs.push(p);
    });

    const newIdeas = ideas.filter(i => i.createdAt && i.createdAt >= sevenDaysAgo);
    const totalCompleted = completed.reduce((n, g) => n + g.tasks.length, 0);

    return { completed, added, critHigh, stalledProjs, newIdeas, totalCompleted };
  }, [projects, ideas, sevenDaysAgo]);

  const markdownText = useMemo(() => {
    const d = digest;
    let md = `## DevLab Weekly Digest\n${weekStart.toLocaleDateString('en-US',{month:'long',day:'numeric'})} – ${today.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}\n\n`;
    if (d.totalCompleted > 0) {
      md += `### Completed this week (${d.totalCompleted} tasks)\n\n`;
      d.completed.forEach(g => { md += `**${g.name}** (${g.tasks.length})\n`; g.tasks.forEach(t => { md += `  ✓ ${t.title}\n`; }); md += '\n'; });
      md += '---\n\n';
    }
    if (d.added.length > 0) {
      md += `### Added this week (${d.added.length} new tasks)\n\n`;
      d.added.forEach(t => { md += `  + [${t.projectName}] ${t.title}\n`; });
      md += '\n---\n\n';
    }
    if (d.critHigh.length > 0) {
      md += `### Still open: Critical & High priority (${d.critHigh.length})\n\n`;
      d.critHigh.forEach(t => { md += `  ${t.priority==='critical'?'🔴':'🟡'} [${t.projectName}] ${t.title} — ${t.priority}\n`; });
      md += '\n---\n\n';
    }
    if (d.stalledProjs.length > 0) {
      md += `### Projects needing attention\n\n`;
      d.stalledProjs.forEach(p => { md += `  ⚠ ${p.name} — no activity for ${Math.floor((Date.now()-new Date(p.lastUpdated||0))/86400000)} days\n`; });
      md += '\n---\n\n';
    }
    if (d.newIdeas.length > 0) {
      md += `### Ideas captured this week (${d.newIdeas.length})\n\n`;
      d.newIdeas.forEach(i => { md += `  💡 ${i.text}\n`; });
      md += '\n---\n\n';
    }
    md += `Generated by DevLab`;
    return md;
  }, [digest]);

  const copyDigest = () => {
    navigator.clipboard.writeText(markdownText + (narrative ? '\n\n' + narrative : ''));
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const generateNarrative = async () => {
    const key = loadAnthropicKey();
    if (!key) { setNarError('No Anthropic API key set. Add one in Settings.'); return; }
    setNarLoading(true); setNarError(''); setNarrative('');
    try {
      const d = digest;
      const topProject = d.completed.sort((a,b) => b.tasks.length - a.tasks.length)[0]?.name || 'N/A';
      const prompt = `Write a brief, warm narrative summary (100-150 words) of this developer's week.\nTone: personal, encouraging, forward-looking. Flowing prose, not bullets.\n\nData:\n- Tasks completed: ${d.totalCompleted} across ${d.completed.length} projects\n- Most productive project: ${topProject}\n- Open critical tasks: ${d.critHigh.length}\n- Stalled projects: ${d.stalledProjs.map(p=>p.name).join(', ') || 'none'}\n- New ideas: ${d.newIdeas.length}\n\nKeep it high-level and motivating.`;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-haiku-4-5', max_tokens: 400, messages: [{ role: 'user', content: prompt }] }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        const apiMsg = body.error?.message || body.message || '';
        let msg;
        if (res.status === 401) msg = 'API key not accepted. Check your key in Settings.';
        else if (res.status === 400) msg = apiMsg || 'Bad request to Claude API.';
        else if (res.status === 404) msg = `Model not found${apiMsg ? ': ' + apiMsg : ''}`;
        else if (res.status === 429) msg = 'Rate limited. Try again in a moment.';
        else msg = `API error ${res.status}${apiMsg ? ': ' + apiMsg : ''}`;
        setNarError(msg);
      } else {
        const data = await res.json();
        setNarrative(data.content[0].text);
      }
    } catch (e) {
      setNarError(`Network error: ${e.message || 'could not reach Claude API.'}`);
    }
    setNarLoading(false);
  };

  return (
    <div style={{ padding:'22px 0' }} className="fade-in">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:8 }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, letterSpacing:'0.05em', color:'var(--text-primary)' }}>Weekly Digest</span>
        <div style={{ display:'flex', gap:6 }}>
          {loadAnthropicKey() && (
            <button onClick={generateNarrative} disabled={narLoading}
              style={{ padding:'7px 14px', background:'rgba(206,147,216,0.08)', border:'1px solid rgba(206,147,216,0.18)', borderRadius:8, color:'#ce93d8', fontSize:11, cursor:'pointer' }}>
              {narLoading ? '✨ Writing…' : '✨ Write narrative'}
            </button>
          )}
          <button onClick={copyDigest}
            style={{ padding:'7px 14px', background:'var(--border-alt)', border:'1px solid var(--border-emphasis)', borderRadius:8, color: copied ? '#00e676' : 'var(--text-faint)', fontSize:11, cursor:'pointer', fontWeight:500 }}>
            {copied ? '✓ Copied!' : 'Copy as markdown'}
          </button>
        </div>
      </div>

      <div className="digest-layout" style={{ display:'grid', gridTemplateColumns: (narrative || narError) ? '3fr 2fr' : '1fr', gap:16, alignItems:'start' }}>
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:20 }}>
          <div className="md-preview" dangerouslySetInnerHTML={{ __html: renderMarkdown(markdownText) }} />
        </div>
        {narrative && (
          <div style={{ padding:18, background:'rgba(206,147,216,0.05)', border:'1px solid rgba(206,147,216,0.18)', borderRadius:12, position:'sticky', top:20 }}>
            <div style={{ fontSize:10, fontWeight:600, color:'#ce93d8', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:10 }}>✨ AI Summary</div>
            <div style={{ fontSize:14, color:'var(--text-primary)', lineHeight:1.7 }}>{narrative}</div>
          </div>
        )}
        {narError && !narrative && (
          <div style={{ padding:18, background:'rgba(239,83,80,0.06)', border:'1px solid rgba(239,83,80,0.20)', borderRadius:12, position:'sticky', top:20 }}>
            <div style={{ fontSize:10, fontWeight:600, color:'#ef5350', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:6 }}>Narrative failed</div>
            <div style={{ fontSize:13, color:'#ef5350', lineHeight:1.6 }}>{narError}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Labels View ───────────────────────────────────────────────────────────────
function LabelsView({ projects, onOpenProject }) {
  const [selectedLabel, setSelectedLabel] = useState(null);

  const { labelCounts, labelTasks } = useMemo(() => {
    const counts = {};
    const tasks = {};
    projects.forEach(p => {
      (p.tasks || []).forEach(t => {
        (t.labels || []).forEach(l => {
          counts[l] = (counts[l] || 0) + 1;
          if (!tasks[l]) tasks[l] = [];
          tasks[l].push({ ...t, projectId: p.id, projectName: p.name });
        });
      });
    });
    return { labelCounts: counts, labelTasks: tasks };
  }, [projects]);

  const sortedLabels = useMemo(() =>
    Object.entries(labelCounts).sort((a, b) => b[1] - a[1]),
    [labelCounts]
  );

  const active = selectedLabel || (sortedLabels[0] ? sortedLabels[0][0] : null);
  const tasksForLabel = (active && labelTasks[active]) || [];

  // Group tasks by project
  const grouped = useMemo(() => {
    const g = {};
    tasksForLabel.forEach(t => {
      if (!g[t.projectId]) g[t.projectId] = { name: t.projectName, tasks: [] };
      g[t.projectId].tasks.push(t);
    });

  }, [tasksForLabel]);

  if (sortedLabels.length === 0) {
    return <div style={{ padding:'22px 0' }} className="fade-in"><div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text-faint)', fontSize:14 }}>No labels in use. Add labels to tasks from the project detail view.</div></div>;
  }

  return (
    <div style={{ padding:'22px 0' }} className="fade-in">
      <div style={{ display:'grid', gridTemplateColumns:'220px 1fr', gap:20, alignItems:'start' }} className="detail-panels">
        {/* Label list */}
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:14 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase', marginBottom:10 }}>Labels ({sortedLabels.length})</div>
          <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
            {sortedLabels.map(([label, count]) => {
              const lc = LABEL_COLORS[label] || DEFAULT_LABEL_COLOR;
              const isActive = label === active;
              return (
                <button key={label} onClick={() => setSelectedLabel(label)}
                  style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'7px 10px', borderRadius:7, border:'none', background: isActive ? 'var(--border-alt)' : 'transparent', cursor:'pointer', textAlign:'left', borderLeft: isActive ? `2px solid ${lc.color}` : '2px solid transparent' }}>
                  <span style={{ fontSize:12, color: isActive ? lc.color : 'var(--text-faint)', fontWeight: isActive ? 600 : 400 }}>{label}</span>
                  <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>{count}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Tasks for label */}
        <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase', marginBottom:14 }}>
            Tasks labeled "{active}" ({tasksForLabel.length})
          </div>
          {grouped.map(([pid, { name, tasks }]) => (
            <div key={pid} style={{ marginBottom:14 }}>
              <div onClick={() => onOpenProject(pid)}
                style={{ fontSize:12, fontWeight:600, color:'var(--text-faint)', cursor:'pointer', marginBottom:6 }}>{name} ({tasks.length})</div>
              {tasks.map(t => {
                const ts = TASK_STATUS[t.status] || TASK_STATUS.todo;
                const pr = PRIORITY[t.priority] || PRIORITY.medium;
                return (
                  <div key={t.id} onClick={() => onOpenProject(pid, t.id)}
                    style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:6, cursor:'pointer', transition:'background .12s' }}
                    onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.025)'}
                    onMouseOut={e => e.currentTarget.style.background='transparent'}>
                    <span style={{ fontSize:10 }}>{t.status === 'done' ? '✓' : '□'}</span>
                    <span style={{ flex:1, fontSize:13, color: t.status === 'done' ? 'var(--text-dimmer)' : 'var(--text-primary)', textDecoration: t.status === 'done' ? 'line-through' : 'none' }}>{t.title}</span>
                    {t.priority !== 'none' && <span style={{ fontSize:9, fontWeight:600, padding:'2px 6px', borderRadius:99, color:pr.color, background:pr.bg, textTransform:'uppercase' }}>{pr.label}</span>}

                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Focus View ────────────────────────────────────────────────────────────────
function FocusView({ projects, onOpenProject }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const weekAhead = new Date(today); weekAhead.setDate(weekAhead.getDate() + 7);

  const allTasks = useMemo(() =>
    projects.flatMap(p => (p.tasks || []).map(t => ({ ...t, projectId: p.id, projectName: p.name }))),
    [projects]
  );

  const urgent = useMemo(() =>
    allTasks.filter(t => t.status !== 'done' && (t.priority === 'critical' || t.priority === 'high'))
      .sort((a, b) => {
        const pa = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
        if (pa !== 0) return pa;
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      }),
    [allTasks]
  );

  const dueSoon = useMemo(() =>
    allTasks.filter(t => {
      if (t.status === 'done' || !t.dueDate) return false;
      const d = new Date(t.dueDate + 'T00:00:00');
      return d <= weekAhead;
    }).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)),
    [allTasks]
  );

  const stalled = useMemo(() => {
    const cutoff = Date.now() - 14 * 86400000;
    return projects.filter(p => p.status === 'active' && new Date(p.lastUpdated || 0) < cutoff);
  }, [projects]);

  const allEmpty = urgent.length === 0 && dueSoon.length === 0 && stalled.length === 0;

  const FocusTask = ({ task }) => {
    const pr = PRIORITY[task.priority] || PRIORITY.medium;
    const dueDate = task.dueDate ? new Date(task.dueDate + 'T00:00:00') : null;
    const isOverdue = dueDate && dueDate < today;
    const isDueToday = dueDate && dueDate.getTime() === today.getTime();
    return (
      <div onClick={() => onOpenProject(task.projectId, task.id)}
        style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:8, cursor:'pointer', transition:'background .12s' }}
        onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.025)'}
        onMouseOut={e => e.currentTarget.style.background='transparent'}>
        {task.priority !== 'none' && (
          <span style={{ fontSize:9, fontWeight:600, padding:'2px 6px', borderRadius:99, textTransform:'uppercase', color:pr.color, background:pr.bg, flexShrink:0 }}>{pr.label}</span>
        )}
        <span style={{ flex:1, fontSize:13, color:'var(--text-primary)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{task.title}</span>
        <span style={{ fontSize:10, color:'var(--text-dimmer)', flexShrink:0, cursor:'pointer' }}>{task.projectName} →</span>
        {dueDate && (
          <span style={{ fontSize:10, fontFamily:"'JetBrains Mono',monospace", flexShrink:0, color: isOverdue ? '#ef5350' : isDueToday ? '#ffa726' : 'var(--text-dimmer)' }}>
            {dueDate.toLocaleDateString('en-US', { month:'short', day:'numeric' })}
          </span>
        )}
      </div>
    );
  };

  const SectionHeader = ({ title, count }) => (
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10, marginTop:4 }}>
      <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase' }}>{title}</span>
      {count > 0 && <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>({count})</span>}
    </div>
  );

  return (
    <div style={{ padding:'22px 0' }} className="fade-in">
      {allEmpty ? (
        <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text-faint)', fontSize:14 }}>Nothing urgent. Go build something.</div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {urgent.length > 0 && (
            <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18 }}>
              <SectionHeader title="Critical & High Priority" count={urgent.length} />
              {urgent.map(t => <FocusTask key={t.id} task={t} />)}
            </div>
          )}
          {dueSoon.length > 0 && (
            <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18 }}>
              <SectionHeader title="Due Soon" count={dueSoon.length} />
              {dueSoon.map(t => <FocusTask key={t.id} task={t} />)}
            </div>
          )}
          {stalled.length > 0 && (
            <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18 }}>
              <SectionHeader title="Stalled Projects" count={stalled.length} />
              {stalled.map(p => (
                <div key={p.id} onClick={() => onOpenProject(p.id)}
                  style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:8, cursor:'pointer', transition:'background .12s' }}
                  onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.025)'}
                  onMouseOut={e => e.currentTarget.style.background='transparent'}>
                  <span style={{ fontSize:12, color:'#ffa726' }}>⚠</span>
                  <span style={{ flex:1, fontSize:13, color:'var(--text-faint)' }}>{p.name}</span>
                  <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>no activity for {Math.floor((Date.now() - new Date(p.lastUpdated || 0)) / 86400000)}d</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── GitHub Activity ───────────────────────────────────────────────────────────
function GitHubActivity({ project, creds }) {
  const [collapsed, setCollapsed] = useState(false);
  const [commits, setCommits] = useState({ loading: true, data: [], error: null });
  const [prs, setPrs] = useState({ loading: true, data: [], error: null });
  const [issues, setIssues] = useState({ loading: true, data: [], error: null });

  const repo = useMemo(() => parseRepo(project.repo), [project.repo]);

  useEffect(() => {
    if (!repo || !creds) return;
    const headers = { Authorization: `Bearer ${creds.token}`, Accept: 'application/vnd.github.v3+json' };
    const base = `https://api.github.com/repos/${repo.owner}/${repo.repoName}`;

    fetch(`${base}/commits?per_page=5`, { headers })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => setCommits({ loading: false, data, error: null }))
      .catch(e => setCommits({ loading: false, data: [], error: String(e) }));

    fetch(`${base}/pulls?state=open&per_page=10`, { headers })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => setPrs({ loading: false, data, error: null }))
      .catch(e => setPrs({ loading: false, data: [], error: String(e) }));

    fetch(`${base}/issues?state=open&per_page=10`, { headers })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => setIssues({ loading: false, data: data.filter(i => !i.pull_request), error: null }))
      .catch(e => setIssues({ loading: false, data: [], error: String(e) }));
  }, [project.id, repo, creds]);

  if (!repo) return null;

  const prCount = prs.data.length;
  const issueCount = issues.data.length;
  const lastCommit = commits.data[0] ? relativeTime(commits.data[0].commit?.author?.date) : '';
  const skeleton = <div className="pulsing" style={{ height:14, width:'60%', background:'var(--border)', borderRadius:4, margin:'6px 0' }} />;

  const SubSection = ({ title, loading, error, children, emptyMsg }) => (
    <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:10, fontWeight:600, color:'var(--text-muted)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>{title}</div>
      {loading ? <>{skeleton}{skeleton}</> : error ? (
        <div style={{ fontSize:12, color:'var(--text-dimmer)', fontStyle:'italic' }}>Could not load {title.toLowerCase()}</div>
      ) : children.length === 0 ? (
        <div style={{ fontSize:12, color:'var(--text-dimmer)' }}>{emptyMsg}</div>
      ) : children}
    </div>
  );

  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18, gridColumn:'1 / -1' }}>
      <button onClick={() => setCollapsed(!collapsed)}
        style={{ display:'flex', width:'100%', justifyContent:'space-between', alignItems:'center', background:'none', border:'none', cursor:'pointer', padding:0, color:'var(--text-primary)' }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' }}>
          {collapsed ? '▸' : '▾'} GitHub Activity
        </span>
        <span style={{ fontSize:10, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>
          {!commits.loading && !prs.loading && !issues.loading ? `${prCount} PRs · ${issueCount} issues${lastCommit ? ` · last commit ${lastCommit}` : ''}` : 'Loading…'}
        </span>
      </button>

      {!collapsed && (
        <div style={{ marginTop:14 }}>
          <SubSection title="Recent Commits" loading={commits.loading} error={commits.error} emptyMsg="No commits found">{
            commits.data.map(c => (
              <a key={c.sha} href={c.html_url} target="_blank" rel="noopener noreferrer"
                style={{ display:'flex', alignItems:'baseline', gap:8, padding:'5px 0', fontSize:12, color:'var(--text-faint)', textDecoration:'none' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#29b6f6', fontSize:11, flexShrink:0 }}>{c.sha.slice(0,7)}</span>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{(c.commit?.message || '').split('\n')[0].slice(0,72)}</span>
                <span style={{ color:'var(--text-dimmer)', flexShrink:0, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{relativeTime(c.commit?.author?.date)}</span>
              </a>
            ))
          }</SubSection>

          <SubSection title="Pull Requests" loading={prs.loading} error={prs.error} emptyMsg="No open PRs">{
            prs.data.map(pr => (
              <a key={pr.id} href={pr.html_url} target="_blank" rel="noopener noreferrer"
                style={{ display:'flex', alignItems:'baseline', gap:8, padding:'5px 0', fontSize:12, color:'var(--text-faint)', textDecoration:'none' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#00e676', fontSize:11, flexShrink:0 }}>#{pr.number}</span>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{pr.title}</span>
                <span style={{ color:'var(--text-dimmer)', flexShrink:0, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{relativeTime(pr.created_at)}</span>
              </a>
            ))
          }</SubSection>

          <SubSection title="Issues" loading={issues.loading} error={issues.error} emptyMsg="No open issues">{
            issues.data.map(iss => (
              <a key={iss.id} href={iss.html_url} target="_blank" rel="noopener noreferrer"
                style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 0', fontSize:12, color:'var(--text-faint)', textDecoration:'none' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#ffa726', fontSize:11, flexShrink:0 }}>#{iss.number}</span>
                <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{iss.title}</span>
                {iss.labels?.slice(0,2).map(l => (
                  <span key={l.id} style={{ fontSize:9, padding:'1px 6px', borderRadius:99, background:`#${l.color}22`, color:`#${l.color}`, flexShrink:0 }}>{l.name}</span>
                ))}
                <span style={{ color:'var(--text-dimmer)', flexShrink:0, fontSize:10, fontFamily:"'JetBrains Mono',monospace" }}>{relativeTime(iss.created_at)}</span>
              </a>
            ))
          }</SubSection>
        </div>
      )}
    </div>
  );
}

// ── Global Task List ──────────────────────────────────────────────────────────
function GlobalTaskList({ projects, onUpdate, onDelete, onOpenProject }) {
  const [statusFilter, setStatusFilter] = useState('all');
  const [priorityFilter, setPriorityFilter] = useState('all');
  const [projectFilter, setProjectFilter] = useState('all');
  const [sortBy, setSortBy] = useState('priority');
  const [expandedId, setExpandedId] = useState(null);

  // Flatten all tasks — exclude archived projects entirely
  const allTasks = useMemo(() =>
    projects.filter(p => p.status !== 'archived').flatMap(p => (p.tasks || []).map(t => ({ ...t, projectId: p.id, projectName: p.name }))),
    [projects]
  );

  // Filter — "all" means active tasks (not done)
  const filtered = useMemo(() => {
    let list = allTasks;
    if (statusFilter === 'all') list = list.filter(t => t.status !== 'done');
    else list = list.filter(t => t.status === statusFilter);
    if (priorityFilter !== 'all') list = list.filter(t => t.priority === priorityFilter);
    if (projectFilter !== 'all') list = list.filter(t => t.projectId === projectFilter);
    return list;
  }, [allTasks, statusFilter, priorityFilter, projectFilter]);

  // Sort
  const sorted = useMemo(() => {
    const arr = [...filtered];
    if (sortBy === 'priority') {
      arr.sort((a, b) => {
        const pa = PRIORITY_ORDER[a.priority || 'none'] ?? 4;
        const pb = PRIORITY_ORDER[b.priority || 'none'] ?? 4;
        if (pa !== pb) return pa - pb;
        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      });
    } else if (sortBy === 'due') {
      arr.sort((a, b) => {
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1;
        if (!b.dueDate) return -1;
        return new Date(a.dueDate) - new Date(b.dueDate);
      });
    } else if (sortBy === 'recent') {
      arr.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
    } else if (sortBy === 'project') {
      arr.sort((a, b) => a.projectName.localeCompare(b.projectName));
    }
    return arr;
  }, [filtered, sortBy]);

  // Counts for status pills — "all" counts non-done only
  const statusCounts = useMemo(() => {
    let base = allTasks;
    if (priorityFilter !== 'all') base = base.filter(t => t.priority === priorityFilter);
    if (projectFilter !== 'all') base = base.filter(t => t.projectId === projectFilter);
    const c = { all: base.filter(t => t.status !== 'done').length };
    TASK_STATUS_CYCLE.forEach(s => { c[s] = base.filter(t => t.status === s).length; });
    return c;
  }, [allTasks, priorityFilter, projectFilter]);

  // Priority counts
  const priCounts = useMemo(() => {
    let base = allTasks;
    if (statusFilter !== 'all') base = base.filter(t => t.status === statusFilter);
    if (projectFilter !== 'all') base = base.filter(t => t.projectId === projectFilter);
    const c = {};
    PRIORITY_CYCLE.filter(p => p !== 'none').forEach(p => { c[p] = base.filter(t => t.priority === p).length; });
    return c;
  }, [allTasks, statusFilter, projectFilter]);

  // Projects that have tasks
  const projectsWithTasks = useMemo(() =>
    projects.filter(p => (p.tasks || []).length > 0).map(p => ({ id: p.id, name: p.name })),
    [projects]
  );

  // No-op DnD handlers
  const noop = () => {};

  return (
    <div style={{ padding:'22px 0' }} className="fade-in">
      {/* Filter bar */}
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:18, alignItems:'center' }}>
        {/* Status pills */}
        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
          <button className="pill"
            style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${statusFilter==='all'?'var(--text-primary)':'var(--border)'}`, background: statusFilter==='all'?'var(--border-alt)':'transparent', color: statusFilter==='all'?'var(--text-primary)':'var(--text-faint)', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
            onClick={() => setStatusFilter('all')}>
            Active <span style={{ opacity:.5 }}>{statusCounts.all}</span>
          </button>
          {TASK_STATUS_CYCLE.map(key => {
            const cfg = TASK_STATUS[key];
            return statusCounts[key] > 0 && (
              <button key={key} className="pill"
                style={{ padding:'5px 12px', borderRadius:99, border:`1px solid ${statusFilter===key?cfg.color:'var(--border)'}`, background: statusFilter===key?cfg.bg:'transparent', color: statusFilter===key?cfg.color:'var(--text-faint)', fontSize:12, fontWeight:500, display:'flex', alignItems:'center', gap:5 }}
                onClick={() => setStatusFilter(statusFilter === key ? 'all' : key)}>
                {cfg.label} <span style={{ opacity:.5 }}>{statusCounts[key]}</span>
              </button>
            );
          })}
        </div>

        {/* Priority pills */}
        <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
          {PRIORITY_CYCLE.filter(p => p !== 'none').map(key => {
            const cfg = PRIORITY[key];
            return priCounts[key] > 0 && (
              <button key={key} className="pill"
                style={{ padding:'5px 10px', borderRadius:99, border:`1px solid ${priorityFilter===key?cfg.color:'var(--border)'}`, background: priorityFilter===key?cfg.bg:'transparent', color: priorityFilter===key?cfg.color:'var(--text-faint)', fontSize:11, fontWeight:500, display:'flex', alignItems:'center', gap:4 }}
                onClick={() => setPriorityFilter(priorityFilter === key ? 'all' : key)}>
                {cfg.label} <span style={{ opacity:.5 }}>{priCounts[key]}</span>
              </button>
            );
          })}
        </div>

        {/* Project filter + Sort */}
        <div style={{ display:'flex', gap:6, marginLeft:'auto', flexWrap:'wrap' }}>
          <select value={projectFilter} onChange={e => setProjectFilter(e.target.value)}
            style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:7, padding:'5px 10px', color:'var(--text-dimmer)', fontSize:11, outline:'none', cursor:'pointer' }}>
            <option value="all">All Projects</option>
            {projectsWithTasks.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)}
            style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:7, padding:'5px 10px', color:'var(--text-dimmer)', fontSize:11, outline:'none', cursor:'pointer' }}>
            <option value="priority">↕ Priority</option>
            <option value="due">↕ Due Date</option>
            <option value="recent">↕ Recently Added</option>
            <option value="project">↕ Project</option>
          </select>
        </div>
      </div>

      {/* Task list */}
      <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase' }}>All Tasks</span>
          <span style={{ fontSize:11, color:'var(--text-dimmer)', fontFamily:"'JetBrains Mono',monospace" }}>
            {sorted.filter(t => t.status === 'done').length} / {sorted.length} done
          </span>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
          {sorted.map((task) => (
            <TaskRow key={task.id} task={task} idx={0}
              expanded={expandedId === task.id}
              onToggleExpand={() => setExpandedId(expandedId === task.id ? null : task.id)}
              projectId={task.projectId}
              onUpdate={onUpdate}
              onDelete={onDelete}
              hideDrag={true}
              projectLabel={task.projectName}
              onOpenProject={() => onOpenProject(task.projectId)}
              onDragStart={noop} onDragOver={noop} onDrop={noop} onDragEnd={noop}
              onTouchStart={noop} onTouchMove={noop} onTouchEnd={noop}
            />
          ))}
          {sorted.length === 0 && (
            <div style={{ color:'var(--text-faint)', fontSize:13, textAlign:'center', padding:'32px 0' }}>
              {allTasks.length === 0 ? 'No tasks yet. Add some from a project.' : 'No tasks match your filters.'}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Notes Panel ───────────────────────────────────────────────────────────────
function NotesPanel({ projectId, initialNotes, onSave }) {
  const [text, setText] = useState(initialNotes);
  const [mode, setMode] = useState('preview');
  const [mobileOpen, setMobileOpen] = useState(false);
  const saveTimerRef = useRef(null);
  const isMobile = typeof window !== 'undefined' && window.innerWidth <= 640;

  const doSave = useCallback((val) => {
    onSave(val);
  }, [onSave]);

  const handleChange = (e) => {
    const val = e.target.value;
    setText(val);
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => doSave(val), 2000);
  };

  const handleBlur = () => {
    clearTimeout(saveTimerRef.current);
    doSave(text);
  };

  const switchMode = (m) => {
    if (mode === 'edit' && m === 'preview') { clearTimeout(saveTimerRef.current); doSave(text); }
    setMode(m);
  };

  // Mobile collapsed
  if (isMobile && !mobileOpen) {
    return (
      <button onClick={() => setMobileOpen(true)}
        style={{ width:'100%', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:'14px 18px', color:'var(--text-faint)', fontSize:13, cursor:'pointer', textAlign:'left', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase' }}>Notes</span>
        <span style={{ fontSize:12, color:'var(--text-dimmer)' }}>▾ Expand</span>
      </button>
    );
  }

  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, padding:18 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, letterSpacing:'0.06em', color:'var(--text-primary)', textTransform:'uppercase' }}>Notes</span>
        <div style={{ display:'flex', gap:2 }}>
          {isMobile && (
            <button onClick={() => setMobileOpen(false)}
              style={{ padding:'4px 10px', borderRadius:6, border:'1px solid var(--border-alt)', background:'transparent', color:'var(--text-dimmer)', fontSize:11, cursor:'pointer', marginRight:6 }}>
              ▴ Collapse
            </button>
          )}
          <button onClick={() => switchMode('edit')}
            style={{ padding:'4px 12px', borderRadius:6, border:`1px solid ${mode==='edit'?'#29b6f6':'var(--border-alt)'}`, background: mode==='edit'?'rgba(41,182,246,0.10)':'transparent', color: mode==='edit'?'#29b6f6':'var(--text-dimmer)', fontSize:11, cursor:'pointer', fontWeight:500 }}>
            Edit
          </button>
          <button onClick={() => switchMode('preview')}
            style={{ padding:'4px 12px', borderRadius:6, border:`1px solid ${mode==='preview'?'#29b6f6':'var(--border-alt)'}`, background: mode==='preview'?'rgba(41,182,246,0.10)':'transparent', color: mode==='preview'?'#29b6f6':'var(--text-dimmer)', fontSize:11, cursor:'pointer', fontWeight:500 }}>
            Preview
          </button>
        </div>
      </div>

      {mode === 'edit' ? (
        <textarea value={text} onChange={handleChange} onBlur={handleBlur}
          placeholder="Write your notes here… supports **markdown**"
          style={{ width:'100%', minHeight:240, background:'var(--surface-raised)', border:'1px solid var(--border-alt)', borderRadius:8, padding:'12px 14px', color:'var(--text-primary)', fontSize:13, outline:'none', lineHeight:1.65, fontFamily:"'JetBrains Mono',monospace", resize:'vertical' }}/>
      ) : (
        <div className="md-preview"
          style={{ minHeight:100, padding:'4px 0', fontSize:13.5, lineHeight:1.65 }}>
          {text ? (
            <div dangerouslySetInnerHTML={{ __html: renderMarkdown(text) }} />
          ) : (
            <div style={{ color:'var(--text-dimmer)', fontSize:13, fontStyle:'italic' }}>No notes yet. Switch to Edit to start writing.</div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Project Modal ──────────────────────────────────────────────────────────────
