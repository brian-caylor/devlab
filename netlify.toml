[build]
  publish = "."
  command = 'sed -i "s|__BUILD_SHA__|${COMMIT_REF:-local}|g; s|__BUILD_BRANCH__|${BRANCH:-local}|g; s|__BUILD_CONTEXT__|${CONTEXT:-local}|g" index.html'

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
