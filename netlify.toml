[build]
  publish = "."
  command = 'sed -i "s|__BUILD_SHA__|${COMMIT_REF:-local}|g; s|__BUILD_BRANCH__|${BRANCH:-local}|g; s|__BUILD_CONTEXT__|${CONTEXT:-local}|g" index.html'

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    # Babel-standalone requires 'unsafe-eval'; inline JSX <script type="text/babel">
    # blocks require 'unsafe-inline'. CSP still meaningfully restricts where
    # scripts/styles/connections can come from, limiting the blast radius of any
    # future XSS bug.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.github.com https://api.anthropic.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
